<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hoops Dynasty</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="draft-styles.css">
</head>
<body>

<!-- Landing Header (shown on home/setup screens, hidden during league view) -->
<div id="landingHeader" class="header">
  <h1 style="margin: 0;">🏀 HOOPS DYNASTY</h1>
</div>

<!-- Home Screen -->
<div id="home-screen" style="display: block;">
  <!-- Content rendered by JavaScript -->
</div>

<!-- My Leagues Screen -->
<div id="myLeagues-screen" style="display: none;">
  <!-- Content rendered by JavaScript -->
</div>

<!-- New League Setup Screen -->
<div id="newLeague-screen" style="display: none;">
  <!-- Content rendered by JavaScript -->
</div>

<!-- Edit Team Screen -->
<div id="editTeam-screen" style="display: none;">
  <!-- Content rendered by JavaScript -->
</div>

<!-- League View (hidden until league is created/loaded) -->
<div id="league-view" style="display: none;">
  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  
  <!-- Sidebar Drawer -->
  <div class="sidebar-drawer" id="sidebarDrawer">
    <div class="sidebar-header">
      <h2 class="sidebar-title">Menu</h2>
      <button class="sidebar-close" onclick="closeSidebar()" aria-label="Close menu">×</button>
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-item" data-tab="dashboard" onclick="switchTab('dashboard')">
        <span class="sidebar-item-icon">📊</span>
        <span class="sidebar-item-text">Dashboard</span>
      </button>
      <button class="sidebar-item" data-tab="standings" onclick="switchTab('standings')">
        <span class="sidebar-item-icon">🏆</span>
        <span class="sidebar-item-text">Standings</span>
      </button>
      <button class="sidebar-item" data-tab="team" onclick="switchTab('team')">
        <span class="sidebar-item-icon">👥</span>
        <span class="sidebar-item-text">Roster</span>
      </button>
      <button class="sidebar-item" data-tab="rotations" onclick="switchTab('rotations')">
        <span class="sidebar-item-icon">🔄</span>
        <span class="sidebar-item-text">Rotations</span>
      </button>
      <button class="sidebar-item" data-tab="finances" onclick="switchTab('finances')">
        <span class="sidebar-item-icon">💰</span>
        <span class="sidebar-item-text">Finances</span>
      </button>
      <button class="sidebar-item" data-tab="trades" onclick="switchTab('trades')">
        <span class="sidebar-item-icon">🔄</span>
        <span class="sidebar-item-text">Trades</span>
      </button>
      <button class="sidebar-item" data-tab="freeagents" onclick="switchTab('freeagents')">
        <span class="sidebar-item-icon">💼</span>
        <span class="sidebar-item-text">Free Agents</span>
      </button>
      <button class="sidebar-item" data-tab="draft" onclick="switchTab('draft')">
        <span class="sidebar-item-icon">🎯</span>
        <span class="sidebar-item-text">Draft</span>
      </button>
      <button class="sidebar-item" data-tab="history" onclick="switchTab('history')">
        <span class="sidebar-item-icon">📜</span>
        <span class="sidebar-item-text">History</span>
      </button>
    </nav>
  </div>

  <!-- Compact Top Bar -->
  <div class="league-top-bar">
    <div class="league-top-left">
      <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">☰</button>
      <div class="league-info-compact" id="leagueInfo">Loading...</div>
    </div>
    <div class="league-top-actions">
      <button onclick="simRegularSeason()" id="simSeasonBtn">Sim Season</button>
      <button onclick="runOffseason()" id="offseasonBtn">Offseason</button>
      <button onclick="runDraft()" id="draftBtn">Draft</button>
      <button onclick="goToHome()">Home</button>
    </div>
  </div>

  <!-- Dashboard Tab -->
  <div id="dashboard-tab" style="display: block;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Standings Tab -->
  <div id="standings-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Team Roster Tab -->
  <div id="team-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Free Agents Tab -->
  <div id="freeagents-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Rotations Tab -->
  <div id="rotations-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Finances Tab -->
  <div id="finances-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Trades Tab -->
  <div id="trades-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Draft Tab -->
  <div id="draft-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- History Tab -->
  <div id="history-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>
</div>

<!-- Player Modal -->
<div id="playerModal" class="modal" onclick="closeModal(event)">
  <div id="modalContent" class="modal-content">
    <!-- Content rendered by JavaScript -->
  </div>
</div>

<!-- Welcome Overlay -->
<div id="welcomeOverlay" class="welcome-overlay hidden">
  <div class="welcome-card">
    <button class="welcome-close" onclick="closeWelcomeOverlay()">×</button>
    <div id="welcomeContent">
      <!-- Content rendered by JavaScript -->
    </div>
  </div>
</div>

<script src="db.js" defer></script>
<script src="engine.js" defer></script>
<script src="app.js" defer></script>

</body>
</html>
