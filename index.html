<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hoops Dynasty</title>
  <link rel="stylesheet" href="styles.css?v=2026-01-12">
  <link rel="stylesheet" href="draft-styles.css?v=2026-01-12">
</head>
<body>

<!-- Landing Header (shown on home/setup screens, hidden during league view) -->
<div id="landingHeader" class="header">
  <h1 style="margin: 0;">🏀 HOOPS DYNASTY</h1>
</div>

<!-- Home Screen -->
<div id="home-screen" style="display: block;">
  <!-- Content rendered by JavaScript -->
</div>

<!-- My Leagues Screen -->
<div id="myLeagues-screen" style="display: none;">
  <!-- Content rendered by JavaScript -->
</div>

<!-- New League Setup Screen -->
<div id="newLeague-screen" style="display: none;">
  <!-- Content rendered by JavaScript -->
</div>

<!-- Edit Team Screen -->
<div id="editTeam-screen" style="display: none;">
  <!-- Content rendered by JavaScript -->
</div>

<!-- League View (hidden until league is created/loaded) -->
<div id="league-view" style="display: none;">
  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  
  <!-- Sidebar Drawer -->
  <div class="sidebar-drawer" id="sidebarDrawer">
    <div class="sidebar-header">
      <h2 class="sidebar-title">Menu</h2>
      <button class="sidebar-close" onclick="closeSidebar()" aria-label="Close menu">×</button>
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-item" data-tab="dashboard" onclick="switchTab('dashboard')">
        <span class="sidebar-item-icon">📊</span>
        <span class="sidebar-item-text">Dashboard</span>
      </button>
      <button class="sidebar-item" data-tab="standings" onclick="switchTab('standings')">
        <span class="sidebar-item-icon">🏆</span>
        <span class="sidebar-item-text">Standings</span>
      </button>
      <button class="sidebar-item" data-tab="team" onclick="switchTab('team')">
        <span class="sidebar-item-icon">👥</span>
        <span class="sidebar-item-text">Roster</span>
      </button>
      <button class="sidebar-item" data-tab="teamManagement" onclick="switchTab('teamManagement')">
        <span class="sidebar-item-icon">⚙️</span>
        <span class="sidebar-item-text">Team Management</span>
      </button>
      <button class="sidebar-item" data-tab="rotations" onclick="switchTab('rotations')">
        <span class="sidebar-item-icon">🔄</span>
        <span class="sidebar-item-text">Rotations</span>
      </button>
      <button class="sidebar-item" data-tab="schedule" onclick="switchTab('schedule')">
        <span class="sidebar-item-icon">📅</span>
        <span class="sidebar-item-text">Schedule</span>
      </button>
      <button class="sidebar-item" data-tab="stats" onclick="switchTab('stats')">
        <span class="sidebar-item-icon">📊</span>
        <span class="sidebar-item-text">Stats</span>
      </button>
      <button class="sidebar-item" data-tab="leaders" onclick="switchTab('leaders')">
        <span class="sidebar-item-icon">🏅</span>
        <span class="sidebar-item-text">Leaders</span>
      </button>
      <button class="sidebar-item" data-tab="awards" onclick="switchTab('awards')">
        <span class="sidebar-item-icon">🏆</span>
        <span class="sidebar-item-text">Award Races</span>
      </button>
      <button class="sidebar-item" data-tab="players" onclick="switchTab('players')">
        <span class="sidebar-item-icon">👤</span>
        <span class="sidebar-item-text">Players</span>
      </button>
      <button class="sidebar-item" data-tab="news" onclick="switchTab('news')">
        <span class="sidebar-item-icon">📰</span>
        <span class="sidebar-item-text">News</span>
      </button>
      <button class="sidebar-item" data-tab="finances" onclick="switchTab('finances')">
        <span class="sidebar-item-icon">💰</span>
        <span class="sidebar-item-text">Finances</span>
      </button>
      <button class="sidebar-item" data-tab="trades" onclick="switchTab('trades')">
        <span class="sidebar-item-icon">🔄</span>
        <span class="sidebar-item-text">Trades</span>
      </button>
      <button class="sidebar-item" data-tab="freeagents" onclick="switchTab('freeagents')">
        <span class="sidebar-item-icon">💼</span>
        <span class="sidebar-item-text">Free Agents</span>
      </button>
      <button class="sidebar-item" data-tab="draft" onclick="switchTab('draft')">
        <span class="sidebar-item-icon">🎯</span>
        <span class="sidebar-item-text">Draft</span>
      </button>
      <button class="sidebar-item" data-tab="expansion" onclick="switchTab('expansion')">
        <span class="sidebar-item-icon">🌟</span>
        <span class="sidebar-item-text">Expansion</span>
      </button>
      <button class="sidebar-item" data-tab="history" onclick="switchTab('history')">
        <span class="sidebar-item-icon">📜</span>
        <span class="sidebar-item-text">History</span>
      </button>
      <button class="sidebar-item" data-tab="career" onclick="switchTab('career')">
        <span class="sidebar-item-icon">💼</span>
        <span class="sidebar-item-text">Career</span>
      </button>
      <button class="sidebar-item" data-tab="settings" onclick="switchTab('settings')">
        <span class="sidebar-item-icon">⚙️</span>
        <span class="sidebar-item-text">Settings</span>
      </button>
    </nav>
  </div>

  <!-- Compact Top Bar -->
  <div class="league-top-bar">
    <div class="league-top-left">
      <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">☰</button>
      <div class="league-info-compact" id="leagueInfo">Loading...</div>
    </div>
    <div class="league-top-actions">
      <div id="commissionerBadge" 
           style="display: none; 
                  margin-right: 15px; 
                  padding: 6px 12px; 
                  background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); 
                  color: #fff; 
                  border-radius: 6px; 
                  font-size: 0.85em; 
                  cursor: pointer;
                  transition: all 0.2s;
                  border: 1px solid rgba(255,255,255,0.2);"
           onclick="toggleCommissionerPanel()"
           title="Commissioner Mode Active - Click for options">
        <span style="margin-right: 6px;">⚖️</span>
        <span style="font-weight: 500;">Commissioner Mode</span>
      </div>
      
      <!-- Sim Control Buttons -->
      <div class="sim-control-wrapper">
        <div class="sim-status-label" id="simStatusLabel">2026 Regular Season · Idle</div>
        <div class="sim-buttons-container">
          <button class="sim-button-compact" onclick="executeSimGame()" id="simGameButton" title="Simulate one game">
            <span>⏩</span> Game
          </button>
          <button class="sim-button-primary" onclick="executeSimUntilEvent()" id="simEventButton" title="Simulate until next event (RECOMMENDED)">
            <span>⏭️</span> Until Event
          </button>
          <button class="sim-button-compact" onclick="executeSimWeek()" id="simWeekButton" title="Simulate 3-5 games">
            <span>📅</span> Week
          </button>
          <button class="sim-button-compact" onclick="executeSimMonth()" id="simMonthButton" title="Simulate 12-15 games">
            <span>📆</span> Month
          </button>
          <button class="sim-button-compact" onclick="executeSimSeason()" id="simSeasonButton" title="Simulate entire season">
            <span>🏀</span> Season
          </button>
          <button class="sim-button-resume" onclick="executeResumeSimulation()" id="resumeButton" style="display: none;" title="Resume paused simulation">
            <span>▶️</span> Resume
          </button>
        </div>
      </div>
      
      <button onclick="goToHome()">Home</button>
    </div>
  </div>

  <!-- Commissioner Panel Modal -->
  <div id="commissionerPanel" style="
    display: none;
    position: fixed;
    top: 60px;
    right: 20px;
    width: 350px;
    background: #1a2332;
    border: 2px solid #3498db;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 1000;
  ">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <h3 style="margin: 0; color: #3498db; font-size: 1.2em;">
        <span style="margin-right: 8px;">⚖️</span>Commissioner Mode
      </h3>
      <button onclick="toggleCommissionerPanel()" style="
        background: transparent;
        border: none;
        color: #888;
        font-size: 1.5em;
        cursor: pointer;
        padding: 0;
        line-height: 1;
      ">×</button>
    </div>
    
    <div style="
      padding: 12px;
      background: #27ae60;
      color: #fff;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 0.9em;
      font-weight: bold;
    ">
      ✅ Status: Active
    </div>
    
    <div style="
      padding: 12px;
      background: #f39c12;
      color: #000;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 0.85em;
      line-height: 1.5;
    ">
      ⚠️ <strong>Warning:</strong>
      <br>• All actions are logged
      <br>• League flagged as "Modified"
      <br>• Achievements disabled
    </div>
    
    <div style="margin-bottom: 15px; color: #888; font-size: 0.85em; line-height: 1.6;">
      Commissioner Mode grants full administrative control. Use responsibly.
    </div>
    
    <button onclick="commissionerForceSchedule()" style="
      width: 100%;
      padding: 12px;
      background: #f39c12;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 8px;
    ">⚠️ Regenerate Schedule</button>
    
    <button onclick="promptDisableCommissioner()" style="
      width: 100%;
      padding: 12px;
      background: #95a5a6;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1em;
    ">🔒 Disable Commissioner Mode</button>
  </div>

  <!-- Dashboard Tab -->
  <div id="dashboard-tab" style="display: block;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Standings Tab -->
  <div id="standings-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Team Roster Tab -->
  <div id="team-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Team Management Tab -->
  <div id="teamManagement-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Free Agents Tab -->
  <div id="freeagents-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Rotations Tab -->
  <div id="rotations-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Schedule Tab -->
  <div id="schedule-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Stats Tab -->
  <div id="stats-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Leaders Tab -->
  <div id="leaders-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Award Races Tab -->
  <div id="awards-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Players Tab -->
  <div id="players-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- News Tab -->
  <div id="news-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Settings Tab -->
  <div id="settings-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Finances Tab -->
  <div id="finances-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Trades Tab -->
  <div id="trades-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Draft Tab -->
  <div id="draft-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Expansion Tab -->
  <div id="expansion-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- History Tab -->
  <div id="history-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>

  <!-- Career Tab -->
  <div id="career-tab" style="display: none;">
    <!-- Content rendered by JavaScript -->
  </div>
</div>

<!-- Player Modal -->
<div id="playerModal" class="modal" onclick="closeModal(event)">
  <div id="modalContent" class="modal-content">
    <!-- Content rendered by JavaScript -->
  </div>
</div>

<!-- Welcome Overlay -->
<div id="welcomeOverlay" class="welcome-overlay hidden">
  <div class="welcome-card">
    <button class="welcome-close" onclick="closeWelcomeOverlay()">×</button>
    <div id="welcomeContent">
      <!-- Content rendered by JavaScript -->
    </div>
  </div>
</div>

<script src="db.js?v=2026-01-12" defer></script>
<script src="schedule-generator.js?v=2026-01-12" defer></script>
<script src="engine.js?v=2026-01-12" defer></script>
<script src="state-manager.js?v=2026-01-12" defer></script>
<script src="app.js?v=2026-01-12" defer></script>
<script src="players-tab.js?v=2026-01-12" defer></script>
<script src="leaders-tab.js?v=2026-01-12" defer></script>
<script src="awards-tab.js?v=2026-01-12" defer></script>
<script src="job-security.js?v=2026-01-12" defer></script>
<script src="history-tab.js?v=2026-01-12" defer></script>

<script>
// Initialize app when all scripts are loaded
window.addEventListener('DOMContentLoaded', () => {
  console.log('[APP] DOM loaded, initializing...');
  initializeApp();
});
</script>

</body>
</html>
