<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Court GM - Basketball Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #030712;
            color: #fff;
            overflow-x: hidden;
        }

        .app-container {
            min-height: 100vh;
            display: flex;
        }

        /* Home Screen */
        .home-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        .home-bg-gradient {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 400px;
            background: linear-gradient(180deg, rgba(30, 58, 138, 0.3) 0%, transparent 100%);
            pointer-events: none;
        }

        .home-logo {
            text-align: center;
            margin-bottom: 2rem;
            z-index: 1;
        }

        .logo-icon {
            width: 120px;
            height: 120px;
            background: #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 4rem;
        }

        .home-title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .home-subtitle {
            color: #9ca3af;
            font-size: 1.2rem;
        }

        .home-buttons {
            width: 100%;
            max-width: 400px;
            z-index: 1;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
            padding: 1.25rem;
            border-radius: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-secondary {
            background: #1f2937;
            color: white;
            border: 2px solid #374151;
            padding: 1.25rem;
            border-radius: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.2s;
        }

        .btn-secondary:hover {
            background: #374151;
        }

        .btn-disabled {
            background: #111827;
            color: #6b7280;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn-disabled:hover {
            background: #111827;
        }

        .btn-subtitle {
            font-size: 0.875rem;
            font-weight: normal;
            opacity: 0.8;
        }

        .home-features {
            margin-top: 4rem;
            width: 100%;
            max-width: 400px;
            z-index: 1;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #9ca3af;
            margin-bottom: 0.75rem;
        }

        .feature-icon {
            color: #60a5fa;
            font-size: 1.25rem;
        }

        .version {
            position: absolute;
            bottom: 2rem;
            color: #6b7280;
            font-size: 0.875rem;
        }

        /* Sidebar Layout */
        .sidebar-layout {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #111827;
            border-right: 1px solid #1f2937;
            padding: 2rem 0;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 0 1.5rem 2rem;
            border-bottom: 1px solid #1f2937;
        }

        .sidebar-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2563eb;
            margin-bottom: 0.5rem;
        }

        .sidebar-team {
            color: #9ca3af;
            font-size: 0.875rem;
        }

        .sidebar-nav {
            padding: 1.5rem 0;
        }

        .nav-item {
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: #1f2937;
            color: white;
        }

        .nav-item.active {
            background: #1e3a8a;
            color: white;
            border-left-color: #2563eb;
        }

        .nav-icon {
            font-size: 1.25rem;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
        }

        /* Create League Screen */
        .create-league-screen {
            padding: 4rem 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .screen-header {
            margin-bottom: 3rem;
        }

        .screen-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .screen-subtitle {
            color: #9ca3af;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-label {
            display: block;
            color: #9ca3af;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            background: #1f2937;
            border: 2px solid #374151;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
        }

        .form-input:focus {
            outline: none;
            border-color: #2563eb;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .team-card {
            background: #1f2937;
            border: 2px solid #374151;
            border-radius: 0.75rem;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .team-card:hover {
            border-color: #2563eb;
            background: #374151;
        }

        .team-card.selected {
            border-color: #2563eb;
            background: #1e3a8a;
        }

        .team-city {
            color: #9ca3af;
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
        }

        .team-name {
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Dashboard Screen */
        .dashboard-header {
            background: #111827;
            border-bottom: 1px solid #1f2937;
            padding: 2rem 1.5rem 1.5rem;
        }

        .dashboard-title-section {
            margin-bottom: 1.5rem;
        }

        .dashboard-subtitle {
            color: #9ca3af;
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
        }

        .dashboard-team-name {
            font-size: 2rem;
            font-weight: bold;
        }

        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            background: #1f2937;
            padding: 1rem;
            border-radius: 0.75rem;
        }

        .stat-box {
            text-align: center;
        }

        .stat-label {
            color: #9ca3af;
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .dashboard-content {
            padding: 1.5rem;
        }

        .section {
            margin-bottom: 2rem;
        }

        .section-title {
            color: #9ca3af;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        /* Roster Screen */
        .player-card {
            background: #1f2937;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.2s;
        }

        .player-card:hover {
            background: #374151;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .player-details {
            color: #9ca3af;
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
        }

        .player-stats {
            color: #6b7280;
            font-size: 0.75rem;
        }

        .player-overall {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
        }

        .overall-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .overall-number {
            font-size: 2rem;
            font-weight: bold;
        }

        .overall-label {
            color: #6b7280;
            font-size: 0.875rem;
        }

        .ovr-purple { color: #c084fc; }
        .ovr-blue { color: #60a5fa; }
        .ovr-green { color: #4ade80; }
        .ovr-yellow { color: #facc15; }
        .ovr-orange { color: #fb923c; }
        .ovr-gray { color: #9ca3af; }

        .player-action-btn {
            background: #374151;
            border: none;
            color: #9ca3af;
            padding: 0.5rem;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
        }

        .player-action-btn:hover {
            background: #4b5563;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1f2937;
            border-radius: 1rem;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid #374151;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .modal-close {
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-stat-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #374151;
        }

        .modal-stat-label {
            color: #9ca3af;
        }

        .modal-stat-value {
            font-weight: 600;
        }

        /* Team Picker Dropdown */
        .team-picker {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 0.75rem;
            margin-top: 1rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .team-picker-item {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #374151;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .team-picker-item:hover {
            background: #374151;
        }

        .team-picker-item.selected {
            background: rgba(30, 58, 138, 0.3);
        }

        .team-badge {
            background: #2563eb;
            color: white;
            padding: 0.125rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* Utility Classes */
        .hidden {
            display: none !important;
        }

        .flex {
            display: flex;
        }

        .flex-col {
            flex-direction: column;
        }

        .items-center {
            align-items: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .gap-2 {
            gap: 0.5rem;
        }

        .mb-4 {
            margin-bottom: 1rem;
        }

        .text-center {
            text-align: center;
        }

        .empty-state {
            text-align: center;
            color: #6b7280;
            padding: 2rem;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }

            .sidebar-header {
                padding: 0 1rem 1rem;
            }

            .sidebar-title {
                font-size: 0.875rem;
            }

            .sidebar-team {
                display: none;
            }

            .nav-item span {
                display: none;
            }

            .nav-item {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div id="app" class="app-container"></div>

    <script>
        // Game State Management
        const GameState = {
            currentScreen: 'home',
            savedLeagues: [],
            currentLeague: null,
            userTeamId: null,
            viewingTeamId: null,
            teams: [],
            players: [],
            coaches: [],
            currentSeason: 2025,
            selectedPlayer: null,
            showTeamPicker: false,

            // Initialize the game
            init() {
                const saved = localStorage.getItem('darkCourtGM');
                if (saved) {
                    const data = JSON.parse(saved);
                    this.savedLeagues = data.savedLeagues || [];
                }
                this.render();
            },

            // Save game state
            save() {
                const data = {
                    savedLeagues: this.savedLeagues,
                };
                localStorage.setItem('darkCourtGM', JSON.stringify(data));
            },

            // Navigate to a screen
            navigate(screen, params = {}) {
                this.currentScreen = screen;
                Object.assign(this, params);
                this.render();
            },

            // Render the current screen
            render() {
                const app = document.getElementById('app');
                
                switch(this.currentScreen) {
                    case 'home':
                        app.innerHTML = this.renderHomeScreen();
                        break;
                    case 'createLeague':
                        app.innerHTML = this.renderCreateLeagueScreen();
                        break;
                    case 'dashboard':
                        app.innerHTML = this.renderWithSidebar(this.renderDashboard());
                        break;
                    case 'roster':
                        app.innerHTML = this.renderWithSidebar(this.renderRosterScreen());
                        break;
                    case 'standings':
                        app.innerHTML = this.renderWithSidebar(this.renderStandingsScreen());
                        break;
                    case 'finances':
                        app.innerHTML = this.renderWithSidebar(this.renderFinancesScreen());
                        break;
                    default:
                        app.innerHTML = this.renderHomeScreen();
                }
                
                this.attachEventListeners();
            },

            // Render Home Screen
            renderHomeScreen() {
                const hasLeague = this.savedLeagues.length > 0;
                
                return `
                    <div class="home-screen">
                        <div class="home-bg-gradient"></div>
                        
                        <div class="home-logo">
                            <div class="logo-icon">🏀</div>
                            <h1 class="home-title">Dark Court GM</h1>
                            <p class="home-subtitle">Build Your Dynasty</p>
                        </div>

                        <div class="home-buttons">
                            <button class="btn-primary" data-action="createLeague">
                                <div class="flex items-center gap-2">
                                    <span>➕</span>
                                    <span>Create New League</span>
                                </div>
                                <span class="btn-subtitle">Start fresh with 30 teams</span>
                            </button>

                            ${hasLeague ? `
                                <button class="btn-secondary" data-action="continueLeague">
                                    <div class="flex items-center gap-2">
                                        <span>▶️</span>
                                        <span>Continue</span>
                                    </div>
                                    <span class="btn-subtitle">Resume your league</span>
                                </button>
                            ` : `
                                <button class="btn-disabled">
                                    <div class="flex items-center gap-2">
                                        <span>▶️</span>
                                        <span>Continue</span>
                                    </div>
                                    <span class="btn-subtitle">No league found</span>
                                </button>
                            `}
                        </div>

                        <div class="home-features">
                            <div class="feature-item">
                                <span class="feature-icon">🏆</span>
                                <span>Manage 30 teams across the league</span>
                            </div>
                            <div class="feature-item">
                                <span class="feature-icon">👥</span>
                                <span>Trade and sign 450+ unique players</span>
                            </div>
                            <div class="feature-item">
                                <span class="feature-icon">📊</span>
                                <span>Simulate seasons and build dynasties</span>
                            </div>
                        </div>

                        <div class="version">v1.0.0</div>
                    </div>
                `;
            },

            // Render Create League Screen
            renderCreateLeagueScreen() {
                const teams = this.generateTeams();
                
                return `
                    <div class="create-league-screen">
                        <div class="screen-header">
                            <h1 class="screen-title">Create New League</h1>
                            <p class="screen-subtitle">Select your team to begin your dynasty</p>
                        </div>

                        <div class="form-group">
                            <label class="form-label">League Name</label>
                            <input 
                                type="text" 
                                class="form-input" 
                                id="leagueName" 
                                placeholder="My Basketball League"
                                value="Dark Court League ${this.currentSeason}"
                            >
                        </div>

                        <div class="form-group">
                            <label class="form-label">Select Your Team</label>
                            <div class="team-grid" id="teamGrid">
                                ${teams.map(team => `
                                    <div class="team-card" data-team-id="${team.id}">
                                        <div class="team-city">${team.city}</div>
                                        <div class="team-name">${team.name}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <button class="btn-primary" data-action="startLeague">
                            Start League
                        </button>
                    </div>
                `;
            },

            // Render with Sidebar
            renderWithSidebar(content) {
                const team = this.teams.find(t => t.id === this.userTeamId);
                
                return `
                    <div class="sidebar-layout">
                        <nav class="sidebar">
                            <div class="sidebar-header">
                                <div class="sidebar-title">Dark Court GM</div>
                                ${team ? `<div class="sidebar-team">${team.city} ${team.name}</div>` : ''}
                            </div>
                            <div class="sidebar-nav">
                                ${this.renderNavItem('dashboard', '🏠', 'Dashboard')}
                                ${this.renderNavItem('roster', '👥', 'Roster')}
                                ${this.renderNavItem('standings', '📊', 'Standings')}
                                ${this.renderNavItem('finances', '💰', 'Finances')}
                                ${this.renderNavItem('draft', '🎯', 'Draft')}
                                ${this.renderNavItem('schedule', '📅', 'Schedule')}
                                ${this.renderNavItem('trades', '🔄', 'Trades')}
                                ${this.renderNavItem('freeAgents', '✍️', 'Free Agents')}
                                ${this.renderNavItem('stats', '📈', 'Stats')}
                                ${this.renderNavItem('history', '📜', 'History')}
                            </div>
                        </nav>
                        <main class="main-content">
                            ${content}
                        </main>
                    </div>
                `;
            },

            renderNavItem(screen, icon, label) {
                const active = this.currentScreen === screen ? 'active' : '';
                return `
                    <div class="nav-item ${active}" data-nav="${screen}">
                        <span class="nav-icon">${icon}</span>
                        <span>${label}</span>
                    </div>
                `;
            },

            // Render Dashboard
            renderDashboard() {
                const team = this.teams.find(t => t.id === this.userTeamId);
                if (!team) return '<div class="empty-state">Loading...</div>';

                const roster = this.players.filter(p => team.playerIds.includes(p.id));
                const totalSalary = roster.reduce((sum, p) => sum + p.contract.salary, 0);
                const capSpace = team.budget - totalSalary;

                return `
                    <div>
                        <div class="dashboard-header">
                            <div class="dashboard-title-section">
                                <div class="dashboard-subtitle">YOUR TEAM</div>
                                <h1 class="dashboard-team-name">${team.city} ${team.name}</h1>
                            </div>
                            <div class="dashboard-stats">
                                <div class="stat-box">
                                    <div class="stat-label">Record</div>
                                    <div class="stat-value">${team.wins}-${team.losses}</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-label">Roster</div>
                                    <div class="stat-value">${roster.length}/15</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-label">Salary</div>
                                    <div class="stat-value">$${totalSalary.toFixed(1)}M</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-label">Cap Space</div>
                                    <div class="stat-value ${capSpace > 0 ? 'text-green-400' : 'text-red-400'}">
                                        $${capSpace.toFixed(1)}M
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="dashboard-content">
                            <div class="section">
                                <h2 class="section-title">Quick Actions</h2>
                                <div class="team-grid">
                                    <button class="btn-primary" data-nav="roster">
                                        View Roster
                                    </button>
                                    <button class="btn-primary" data-nav="freeAgents">
                                        Sign Players
                                    </button>
                                    <button class="btn-primary" data-nav="trades">
                                        Make Trades
                                    </button>
                                    <button class="btn-primary" data-nav="schedule">
                                        View Schedule
                                    </button>
                                </div>
                            </div>

                            <div class="section">
                                <h2 class="section-title">Top Players</h2>
                                ${roster
                                    .sort((a, b) => b.overall - a.overall)
                                    .slice(0, 5)
                                    .map(player => `
                                        <div class="player-card" data-player-id="${player.id}">
                                            <div class="player-info">
                                                <div class="player-name">${player.name}</div>
                                                <div class="player-details">
                                                    ${player.position} • Age ${player.age} • $${player.contract.salary.toFixed(1)}M/yr
                                                </div>
                                                <div class="player-stats">
                                                    ${player.stats.points} PTS • ${player.stats.rebounds} REB • ${player.stats.assists} AST
                                                </div>
                                            </div>
                                            <div class="player-overall">
                                                <div class="overall-badge">
                                                    <div class="overall-number ${this.getOverallColor(player.overall)}">${player.overall}</div>
                                                    <div class="overall-label">OVR</div>
                                                </div>
                                            </div>
                                        </div>
                                    `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            },

            // Render Roster Screen
            renderRosterScreen() {
                const viewingTeam = this.teams.find(t => t.id === this.viewingTeamId);
                if (!viewingTeam) return '<div class="empty-state">Loading...</div>';

                const isOwnTeam = this.viewingTeamId === this.userTeamId;
                const roster = this.players.filter(p => viewingTeam.playerIds.includes(p.id));
                const totalSalary = roster.reduce((sum, p) => sum + p.contract.salary, 0);
                const capSpace = viewingTeam.budget - totalSalary;

                const positions = ['PG', 'SG', 'SF', 'PF', 'C'];
                const groupedRoster = {};
                positions.forEach(pos => {
                    groupedRoster[pos] = roster
                        .filter(p => p.position === pos)
                        .sort((a, b) => b.overall - a.overall);
                });

                return `
                    <div>
                        <div class="dashboard-header">
                            <div class="dashboard-title-section">
                                <div class="dashboard-subtitle">${isOwnTeam ? 'YOUR ROSTER' : 'ROSTER'}</div>
                                <div class="flex items-center gap-2" style="cursor: pointer;" onclick="GameState.toggleTeamPicker()">
                                    <h1 class="dashboard-team-name">${viewingTeam.city} ${viewingTeam.name}</h1>
                                    <span style="color: #60a5fa;">▼</span>
                                </div>
                            </div>

                            ${this.showTeamPicker ? `
                                <div class="team-picker">
                                    ${this.teams
                                        .sort((a, b) => {
                                            if (a.id === this.userTeamId) return -1;
                                            if (b.id === this.userTeamId) return 1;
                                            return b.wins - a.wins;
                                        })
                                        .map(team => `
                                            <div class="team-picker-item ${team.id === this.viewingTeamId ? 'selected' : ''}" 
                                                 data-select-team="${team.id}">
                                                <div>
                                                    <div class="flex items-center gap-2">
                                                        <span style="font-weight: 600;">${team.city} ${team.name}</span>
                                                        ${team.id === this.userTeamId ? '<span class="team-badge">YOU</span>' : ''}
                                                    </div>
                                                    <div style="color: #9ca3af; font-size: 0.875rem; margin-top: 0.25rem;">
                                                        ${team.wins}-${team.losses}
                                                    </div>
                                                </div>
                                                ${team.id === this.viewingTeamId ? '<span>✓</span>' : ''}
                                            </div>
                                        `).join('')}
                                </div>
                            ` : ''}

                            <div class="dashboard-stats" style="margin-top: 1rem;">
                                <div class="stat-box">
                                    <div class="stat-label">Roster Size</div>
                                    <div class="stat-value">${roster.length}/15</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-label">Salary</div>
                                    <div class="stat-value">$${totalSalary.toFixed(1)}M</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-label">Cap Space</div>
                                    <div class="stat-value ${capSpace > 0 ? 'text-green-400' : 'text-red-400'}">
                                        $${capSpace.toFixed(1)}M
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="dashboard-content">
                            ${positions.map(pos => {
                                const positionNames = {
                                    'PG': 'POINT GUARDS',
                                    'SG': 'SHOOTING GUARDS',
                                    'SF': 'SMALL FORWARDS',
                                    'PF': 'POWER FORWARDS',
                                    'C': 'CENTERS'
                                };
                                return `
                                    <div class="section">
                                        <h2 class="section-title">${positionNames[pos]}</h2>
                                        ${groupedRoster[pos].length > 0 ? 
                                            groupedRoster[pos].map(player => `
                                                <div class="player-card" data-player-id="${player.id}">
                                                    <div class="player-info">
                                                        <div class="player-name">${player.name}</div>
                                                        <div class="player-details">
                                                            Age ${player.age} • ${player.contract.years} yr${player.contract.years !== 1 ? 's' : ''} • $${player.contract.salary.toFixed(1)}M/yr
                                                        </div>
                                                        <div class="player-stats">
                                                            ${player.stats.points} PTS • ${player.stats.rebounds} REB • ${player.stats.assists} AST
                                                        </div>
                                                    </div>
                                                    <div class="player-overall">
                                                        <div class="overall-badge">
                                                            <div class="overall-number ${this.getOverallColor(player.overall)}">${player.overall}</div>
                                                            <div class="overall-label">OVR</div>
                                                        </div>
                                                        ${isOwnTeam ? `
                                                            <button class="player-action-btn" data-player-action="${player.id}">⋯</button>
                                                        ` : ''}
                                                    </div>
                                                </div>
                                            `).join('')
                                            : '<div class="empty-state">No players in this position</div>'
                                        }
                                    </div>
                                `;
                            }).join('')}

                            ${isOwnTeam ? `
                                <button class="btn-primary" data-nav="freeAgents">
                                    Sign Free Agents
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            },

            // Render Standings Screen
            renderStandingsScreen() {
                const sortedTeams = [...this.teams].sort((a, b) => {
                    const winPctA = a.wins / (a.wins + a.losses);
                    const winPctB = b.wins / (b.wins + b.losses);
                    return winPctB - winPctA;
                });

                return `
                    <div>
                        <div class="dashboard-header">
                            <div class="dashboard-title-section">
                                <div class="dashboard-subtitle">SEASON ${this.currentSeason}</div>
                                <h1 class="dashboard-team-name">League Standings</h1>
                            </div>
                        </div>

                        <div class="dashboard-content">
                            <div class="section">
                                ${sortedTeams.map((team, index) => {
                                    const winPct = (team.wins / (team.wins + team.losses) * 100).toFixed(1);
                                    const isUserTeam = team.id === this.userTeamId;
                                    return `
                                        <div class="player-card ${isUserTeam ? 'selected' : ''}" style="cursor: pointer;" 
                                             data-select-team="${team.id}">
                                            <div style="display: flex; align-items: center; gap: 1rem; flex: 1;">
                                                <div style="font-size: 1.5rem; font-weight: bold; color: #6b7280; width: 40px;">
                                                    ${index + 1}
                                                </div>
                                                <div class="player-info">
                                                    <div class="player-name">
                                                        ${team.city} ${team.name}
                                                        ${isUserTeam ? '<span class="team-badge" style="margin-left: 0.5rem;">YOU</span>' : ''}
                                                    </div>
                                                    <div class="player-details">
                                                        ${team.wins}-${team.losses} • ${winPct}% WIN
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
            },

            // Render Finances Screen
            renderFinancesScreen() {
                const team = this.teams.find(t => t.id === this.userTeamId);
                if (!team) return '<div class="empty-state">Loading...</div>';

                const roster = this.players.filter(p => team.playerIds.includes(p.id));
                const sortedByContract = [...roster].sort((a, b) => b.contract.salary - a.contract.salary);
                const totalSalary = roster.reduce((sum, p) => sum + p.contract.salary, 0);
                const capSpace = team.budget - totalSalary;
                const luxuryTax = Math.max(0, totalSalary - team.budget) * 1.5;

                return `
                    <div>
                        <div class="dashboard-header">
                            <div class="dashboard-title-section">
                                <div class="dashboard-subtitle">TEAM FINANCES</div>
                                <h1 class="dashboard-team-name">${team.city} ${team.name}</h1>
                            </div>
                            <div class="dashboard-stats">
                                <div class="stat-box">
                                    <div class="stat-label">Total Salary</div>
                                    <div class="stat-value">$${totalSalary.toFixed(1)}M</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-label">Salary Cap</div>
                                    <div class="stat-value">$${team.budget.toFixed(1)}M</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-label">Cap Space</div>
                                    <div class="stat-value ${capSpace > 0 ? 'text-green-400' : 'text-red-400'}">
                                        $${capSpace.toFixed(1)}M
                                    </div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-label">Luxury Tax</div>
                                    <div class="stat-value ${luxuryTax > 0 ? 'text-red-400' : ''}">
                                        $${luxuryTax.toFixed(1)}M
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="dashboard-content">
                            <div class="section">
                                <h2 class="section-title">Player Salaries</h2>
                                ${sortedByContract.map(player => `
                                    <div class="player-card">
                                        <div class="player-info">
                                            <div class="player-name">${player.name}</div>
                                            <div class="player-details">
                                                ${player.position} • ${player.contract.years} year${player.contract.years !== 1 ? 's' : ''} remaining
                                            </div>
                                        </div>
                                        <div style="text-align: right;">
                                            <div style="font-size: 1.5rem; font-weight: bold;">
                                                $${player.contract.salary.toFixed(1)}M
                                            </div>
                                            <div style="color: #9ca3af; font-size: 0.875rem;">per year</div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            },

            // Helper Functions
            toggleTeamPicker() {
                this.showTeamPicker = !this.showTeamPicker;
                this.render();
            },

            getOverallColor(overall) {
                if (overall >= 90) return 'ovr-purple';
                if (overall >= 85) return 'ovr-blue';
                if (overall >= 80) return 'ovr-green';
                if (overall >= 75) return 'ovr-yellow';
                if (overall >= 70) return 'ovr-orange';
                return 'ovr-gray';
            },

            // Generate Teams
            generateTeams() {
                const teamData = [
                    { city: 'New York', name: 'Titans' },
                    { city: 'Los Angeles', name: 'Knights' },
                    { city: 'Chicago', name: 'Storm' },
                    { city: 'Houston', name: 'Rockets' },
                    { city: 'Phoenix', name: 'Suns' },
                    { city: 'Philadelphia', name: 'Liberty' },
                    { city: 'San Antonio', name: 'Spurs' },
                    { city: 'Dallas', name: 'Mavericks' },
                    { city: 'Miami', name: 'Heat' },
                    { city: 'Boston', name: 'Celtics' },
                    { city: 'Atlanta', name: 'Hawks' },
                    { city: 'Detroit', name: 'Motors' },
                    { city: 'Seattle', name: 'Thunder' },
                    { city: 'Portland', name: 'Blazers' },
                    { city: 'Denver', name: 'Nuggets' },
                    { city: 'Milwaukee', name: 'Bucks' },
                    { city: 'Orlando', name: 'Magic' },
                    { city: 'Charlotte', name: 'Hornets' },
                    { city: 'Sacramento', name: 'Kings' },
                    { city: 'Memphis', name: 'Grizzlies' },
                    { city: 'Toronto', name: 'Raptors' },
                    { city: 'Brooklyn', name: 'Nets' },
                    { city: 'Washington', name: 'Wizards' },
                    { city: 'Minnesota', name: 'Wolves' },
                    { city: 'New Orleans', name: 'Pelicans' },
                    { city: 'Cleveland', name: 'Cavaliers' },
                    { city: 'Indiana', name: 'Pacers' },
                    { city: 'Utah', name: 'Jazz' },
                    { city: 'Golden State', name: 'Warriors' },
                    { city: 'Oklahoma City', name: 'Thunder' },
                ];

                return teamData.map((team, i) => ({
                    id: `team-${i}`,
                    ...team,
                    wins: 0,
                    losses: 0,
                    budget: 120.0,
                    playerIds: []
                }));
            },

            // Generate Players
            generatePlayers(numPlayers = 450) {
                const firstNames = ['Marcus', 'Jaylen', 'Devin', 'Trae', 'Donovan', 'Zion', 'Luka', 'Ja', 'Anthony', 'Damian', 'Joel', 'Giannis', 'Nikola', 'Stephen', 'LeBron', 'Kevin', 'Kawhi', 'Paul', 'James', 'Chris', 'Russell', 'Kyrie', 'Jimmy', 'Bradley', 'Klay', 'Draymond', 'Rudy', 'Karl', 'Ben', 'Pascal'];
                const lastNames = ['Williams', 'Brown', 'Booker', 'Young', 'Mitchell', 'Williamson', 'Doncic', 'Morant', 'Davis', 'Lillard', 'Embiid', 'Antetokounmpo', 'Jokic', 'Curry', 'James', 'Durant', 'Leonard', 'George', 'Harden', 'Paul', 'Westbrook', 'Irving', 'Butler', 'Beal', 'Thompson', 'Green', 'Gobert', 'Towns', 'Simmons', 'Siakam'];
                const positions = ['PG', 'SG', 'SF', 'PF', 'C'];

                const players = [];
                for (let i = 0; i < numPlayers; i++) {
                    const age = 19 + Math.floor(Math.random() * 18);
                    const potential = 60 + Math.floor(Math.random() * 40);
                    const development = Math.min(1, Math.max(0, (age - 19) / 10));
                    const overall = Math.floor(potential * (0.5 + development * 0.5));

                    players.push({
                        id: `player-${i}`,
                        name: `${firstNames[Math.floor(Math.random() * firstNames.length)]} ${lastNames[Math.floor(Math.random() * lastNames.length)]}`,
                        age,
                        position: positions[Math.floor(Math.random() * positions.length)],
                        overall,
                        potential,
                        contract: {
                            salary: 1 + Math.random() * 30,
                            years: 1 + Math.floor(Math.random() * 4)
                        },
                        stats: {
                            points: 5 + Math.floor(Math.random() * 25),
                            rebounds: 2 + Math.floor(Math.random() * 10),
                            assists: 1 + Math.floor(Math.random() * 10)
                        }
                    });
                }

                return players.sort((a, b) => b.overall - a.overall);
            },

            // Generate Coaches
            generateCoaches() {
                const names = ['Steve Kerr', 'Greg Popovich', 'Erik Spoelstra', 'Doc Rivers', 'Mike Budenholzer'];
                return Array.from({ length: 30 }, (_, i) => ({
                    id: `coach-${i}`,
                    name: names[i % names.length] + ` ${i + 1}`,
                    rating: 70 + Math.floor(Math.random() * 30)
                }));
            },

            // Start a new league
            startLeague(leagueName, selectedTeamId) {
                this.teams = this.generateTeams();
                this.players = this.generatePlayers();
                this.coaches = this.generateCoaches();
                
                // Assign players to teams
                let playerIndex = 0;
                this.teams.forEach(team => {
                    team.playerIds = [];
                    team.coachId = `coach-${this.teams.indexOf(team)}`;
                    for (let i = 0; i < 12 + Math.floor(Math.random() * 4); i++) {
                        if (playerIndex < this.players.length) {
                            team.playerIds.push(this.players[playerIndex].id);
                            playerIndex++;
                        }
                    }
                    // Random record
                    const totalGames = 20;
                    team.wins = Math.floor(Math.random() * (totalGames + 1));
                    team.losses = totalGames - team.wins;
                });

                this.userTeamId = selectedTeamId;
                this.viewingTeamId = selectedTeamId;
                this.currentLeague = {
                    name: leagueName,
                    season: this.currentSeason,
                    userTeamId: selectedTeamId
                };

                this.savedLeagues.push(this.currentLeague);
                this.save();
                this.navigate('dashboard');
            },

            // Continue existing league
            continueLeague() {
                if (this.savedLeagues.length > 0) {
                    const league = this.savedLeagues[0];
                    this.currentLeague = league;
                    this.userTeamId = league.userTeamId;
                    this.viewingTeamId = league.userTeamId;
                    
                    // Regenerate data (in a real app, this would be loaded from save)
                    this.teams = this.generateTeams();
                    this.players = this.generatePlayers();
                    this.coaches = this.generateCoaches();
                    
                    this.navigate('dashboard');
                }
            },

            // Attach Event Listeners
            attachEventListeners() {
                // Action buttons
                document.querySelectorAll('[data-action]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const action = e.currentTarget.dataset.action;
                        if (action === 'createLeague') {
                            this.navigate('createLeague');
                        } else if (action === 'continueLeague') {
                            this.continueLeague();
                        } else if (action === 'startLeague') {
                            const leagueName = document.getElementById('leagueName').value;
                            const selectedTeam = document.querySelector('.team-card.selected');
                            if (selectedTeam) {
                                this.startLeague(leagueName, selectedTeam.dataset.teamId);
                            } else {
                                alert('Please select a team');
                            }
                        }
                    });
                });

                // Team selection
                document.querySelectorAll('.team-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        document.querySelectorAll('.team-card').forEach(c => c.classList.remove('selected'));
                        e.currentTarget.classList.add('selected');
                    });
                });

                // Navigation
                document.querySelectorAll('[data-nav]').forEach(item => {
                    item.addEventListener('click', (e) => {
                        const screen = e.currentTarget.dataset.nav;
                        this.navigate(screen);
                    });
                });

                // Team picker
                document.querySelectorAll('[data-select-team]').forEach(item => {
                    item.addEventListener('click', (e) => {
                        const teamId = e.currentTarget.dataset.selectTeam;
                        this.viewingTeamId = teamId;
                        this.showTeamPicker = false;
                        this.render();
                    });
                });

                // Player cards
                document.querySelectorAll('[data-player-id]').forEach(card => {
                    card.addEventListener('click', (e) => {
                        if (!e.target.closest('[data-player-action]')) {
                            const playerId = e.currentTarget.dataset.playerId;
                            const player = this.players.find(p => p.id === playerId);
                            if (player) {
                                this.showPlayerModal(player);
                            }
                        }
                    });
                });
            },

            // Show player modal
            showPlayerModal(player) {
                const modal = document.createElement('div');
                modal.className = 'modal-overlay active';
                modal.innerHTML = `
                    <div class="modal">
                        <div class="modal-header">
                            <h2 class="modal-title">${player.name}</h2>
                            <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
                        </div>
                        <div class="modal-body">
                            <div class="modal-stat-row">
                                <span class="modal-stat-label">Position</span>
                                <span class="modal-stat-value">${player.position}</span>
                            </div>
                            <div class="modal-stat-row">
                                <span class="modal-stat-label">Age</span>
                                <span class="modal-stat-value">${player.age}</span>
                            </div>
                            <div class="modal-stat-row">
                                <span class="modal-stat-label">Overall</span>
                                <span class="modal-stat-value ${this.getOverallColor(player.overall)}">${player.overall}</span>
                            </div>
                            <div class="modal-stat-row">
                                <span class="modal-stat-label">Potential</span>
                                <span class="modal-stat-value">${player.potential}</span>
                            </div>
                            <div class="modal-stat-row">
                                <span class="modal-stat-label">Contract</span>
                                <span class="modal-stat-value">${player.contract.years} yr @ $${player.contract.salary.toFixed(1)}M</span>
                            </div>
                            <div class="modal-stat-row">
                                <span class="modal-stat-label">Points</span>
                                <span class="modal-stat-value">${player.stats.points}</span>
                            </div>
                            <div class="modal-stat-row">
                                <span class="modal-stat-label">Rebounds</span>
                                <span class="modal-stat-value">${player.stats.rebounds}</span>
                            </div>
                            <div class="modal-stat-row">
                                <span class="modal-stat-label">Assists</span>
                                <span class="modal-stat-value">${player.stats.assists}</span>
                            </div>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);

                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.remove();
                    }
                });
            }
        };

        // Initialize the game when page loads
        window.addEventListener('DOMContentLoaded', () => {
            GameState.init();
        });
    </script>
</body>
</html>
