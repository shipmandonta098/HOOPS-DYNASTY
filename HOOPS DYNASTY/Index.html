<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoops Dynasty - Basketball GM Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            max-width: 900px;
            width: 90%;
            text-align: center;
        }

        .logo {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 1.2rem;
            margin-bottom: 3rem;
            color: #ffa500;
            font-style: italic;
        }

        .menu-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 3rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .menu-button {
            display: block;
            width: 100%;
            padding: 1.5rem;
            margin: 1rem 0;
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
        }

        .menu-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.6);
        }

        .menu-button:active {
            transform: translateY(-1px);
        }

        .menu-button.secondary {
            background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
            box-shadow: 0 4px 15px rgba(74, 85, 104, 0.4);
        }

        .menu-button.secondary:hover {
            box-shadow: 0 6px 20px rgba(74, 85, 104, 0.6);
        }

        .menu-button:disabled {
            background: linear-gradient(135deg, #718096 0%, #4a5568 100%);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .menu-button:disabled:hover {
            transform: none;
            box-shadow: 0 4px 15px rgba(74, 85, 104, 0.4);
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .back-button {
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .form-group {
            margin: 2rem 0;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #ff6b35;
        }

        .basketball-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .league-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 10px;
            margin: 1rem 0;
            text-align: left;
        }

        .league-info h3 {
            color: #ffa500;
            margin-bottom: 0.5rem;
        }

        .no-leagues {
            padding: 2rem;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Home Page -->
        <div id="homePage" class="page active">
            <div class="basketball-icon">🏀</div>
            <div class="logo">HOOPS DYNASTY</div>
            <div class="tagline">Build Your Basketball Empire</div>
            
            <div class="menu-container">
                <button class="menu-button" onclick="showPage('createLeaguePage')">
                    Create League
                </button>
                <button class="menu-button secondary" id="continueButton" onclick="showPage('continuePage')" disabled>
                    Continue
                </button>
            </div>
        </div>

        <!-- Create League Page -->
        <div id="createLeaguePage" class="page">
            <div class="menu-container">
                <button class="back-button" onclick="showPage('homePage')">← Back to Home</button>
                
                <h2 style="margin-bottom: 2rem;">Create New League</h2>
                
                <form id="createLeagueForm" onsubmit="createLeague(event)">
                    <div class="form-group">
                        <label for="leagueName">League Name:</label>
                        <input type="text" id="leagueName" required placeholder="Enter league name">
                    </div>

                    <div class="form-group">
                        <label for="teamName">Your Team Name:</label>
                        <input type="text" id="teamName" required placeholder="Enter your team name">
                    </div>

                    <div class="form-group">
                        <label for="difficulty">Difficulty:</label>
                        <select id="difficulty" required>
                            <option value="easy">Easy</option>
                            <option value="normal" selected>Normal</option>
                            <option value="hard">Hard</option>
                            <option value="legendary">Legendary</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="numTeams">Number of Teams:</label>
                        <select id="numTeams" required>
                            <option value="8">8 Teams</option>
                            <option value="12">12 Teams</option>
                            <option value="16">16 Teams</option>
                            <option value="24">24 Teams</option>
                            <option value="30" selected>30 Teams</option>
                        </select>
                    </div>

                    <button type="submit" class="menu-button">
                        Start Dynasty
                    </button>
                </form>
            </div>
        </div>

        <!-- Continue Page -->
        <div id="continuePage" class="page">
            <div class="menu-container">
                <button class="back-button" onclick="showPage('homePage')">← Back to Home</button>
                
                <h2 style="margin-bottom: 2rem;">Continue Your Dynasty</h2>
                
                <div id="leaguesList">
                    <div class="no-leagues">No saved leagues found. Create a new league to get started!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Store leagues in localStorage
        function getLeagues() {
            const leagues = localStorage.getItem('hoopsDynastyLeagues');
            return leagues ? JSON.parse(leagues) : [];
        }

        function saveLeagues(leagues) {
            localStorage.setItem('hoopsDynastyLeagues', JSON.stringify(leagues));
            updateContinueButton();
        }

        function updateContinueButton() {
            const leagues = getLeagues();
            const continueButton = document.getElementById('continueButton');
            continueButton.disabled = leagues.length === 0;
        }

        function showPage(pageId) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            
            // Show selected page
            document.getElementById(pageId).classList.add('active');

            // If showing continue page, load leagues
            if (pageId === 'continuePage') {
                loadLeagues();
            }
        }

        function createLeague(event) {
            event.preventDefault();
            
            const leagueName = document.getElementById('leagueName').value;
            const teamName = document.getElementById('teamName').value;
            const difficulty = document.getElementById('difficulty').value;
            const numTeams = document.getElementById('numTeams').value;

            const newLeague = {
                id: Date.now(),
                leagueName,
                teamName,
                difficulty,
                numTeams,
                season: 1,
                createdDate: new Date().toLocaleDateString()
            };

            const leagues = getLeagues();
            leagues.push(newLeague);
            saveLeagues(leagues);

            // Reset form
            document.getElementById('createLeagueForm').reset();

            // Show success message
            alert(`League "${leagueName}" created successfully!\n\nTeam: ${teamName}\nDifficulty: ${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)}\nTeams: ${numTeams}`);
            
            showPage('homePage');
        }

        function loadLeagues() {
            const leagues = getLeagues();
            const leaguesList = document.getElementById('leaguesList');

            if (leagues.length === 0) {
                leaguesList.innerHTML = '<div class="no-leagues">No saved leagues found. Create a new league to get started!</div>';
                return;
            }

            leaguesList.innerHTML = leagues.map(league => `
                <div class="league-info">
                    <h3>🏀 ${league.leagueName}</h3>
                    <p><strong>Team:</strong> ${league.teamName}</p>
                    <p><strong>Season:</strong> ${league.season}</p>
                    <p><strong>Teams:</strong> ${league.numTeams}</p>
                    <p><strong>Difficulty:</strong> ${league.difficulty.charAt(0).toUpperCase() + league.difficulty.slice(1)}</p>
                    <p><strong>Created:</strong> ${league.createdDate}</p>
                    <button class="menu-button" onclick="continueLeague(${league.id})" style="margin-top: 1rem;">
                        Continue Dynasty
                    </button>
                    <button class="menu-button secondary" onclick="deleteLeague(${league.id})" style="margin-top: 0.5rem;">
                        Delete League
                    </button>
                </div>
            `).join('');
        }

        function continueLeague(leagueId) {
            const leagues = getLeagues();
            const league = leagues.find(l => l.id === leagueId);
            
            if (league) {
                alert(`Loading ${league.leagueName}...\n\nThis would take you to the main game interface.\n(Full game features coming soon!)`);
            }
        }

        function deleteLeague(leagueId) {
            if (confirm('Are you sure you want to delete this league? This cannot be undone.')) {
                let leagues = getLeagues();
                leagues = leagues.filter(l => l.id !== leagueId);
                saveLeagues(leagues);
                loadLeagues();
            }
        }

        // Initialize on page load
        updateContinueButton();
    </script>
</body>
</html>
