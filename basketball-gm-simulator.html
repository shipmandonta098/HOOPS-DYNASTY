<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball GM Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 30px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }

        .team-info {
            text-align: center;
            margin-bottom: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .team-info h2 {
            color: #667eea;
            margin-bottom: 5px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            min-width: 150px;
            text-align: center;
        }

        .stat-box h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-box .value {
            font-size: 28px;
            font-weight: bold;
        }

        .roster-section {
            margin-top: 30px;
        }

        .roster-section h2 {
            color: #333;
            margin-bottom: 15px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .player-card {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }

        .player-card:hover {
            transform: translateX(5px);
            background: #e9ecef;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .player-details {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .player-stats {
            display: flex;
            gap: 20px;
        }

        .player-stat {
            text-align: center;
        }

        .player-stat-label {
            font-size: 12px;
            color: #666;
        }

        .player-stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .controls {
            margin: 30px 0;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .log {
            margin-top: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .log h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .log-entry {
            padding: 8px;
            margin: 5px 0;
            background: white;
            border-left: 3px solid #667eea;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏀 Basketball GM Simulator</h1>
        
        <div class="team-info">
            <h2 id="teamName">Your Team</h2>
            <p id="season">Season 1 | Week 1</p>
        </div>

        <div class="stats">
            <div class="stat-box">
                <h3>Wins</h3>
                <div class="value" id="wins">0</div>
            </div>
            <div class="stat-box">
                <h3>Losses</h3>
                <div class="value" id="losses">0</div>
            </div>
            <div class="stat-box">
                <h3>Budget</h3>
                <div class="value" id="budget">$50M</div>
            </div>
            <div class="stat-box">
                <h3>Team Rating</h3>
                <div class="value" id="teamRating">75</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="simulateGame()">Simulate Game</button>
            <button onclick="simulateWeek()">Simulate Week</button>
            <button onclick="generatePlayer()">Scout Player</button>
        </div>

        <div class="roster-section">
            <h2>Team Roster</h2>
            <div id="roster"></div>
        </div>

        <div class="log">
            <h3>Recent Activity</h3>
            <div id="gameLog"></div>
        </div>
    </div>

    <script>
        // Game State
        let gameState = {
            wins: 0,
            losses: 0,
            budget: 50000000,
            season: 1,
            week: 1,
            roster: []
        };

        // Generate initial roster
        function initializeRoster() {
            const positions = ['PG', 'SG', 'SF', 'PF', 'C'];
            const names = ['James', 'Michael', 'Kevin', 'Stephen', 'LeBron', 'Kobe', 'Tim', 'Magic', 'Larry', 'Shaq'];
            const lastNames = ['Johnson', 'Smith', 'Williams', 'Brown', 'Davis', 'Miller', 'Wilson', 'Moore', 'Taylor', 'Anderson'];
            
            for (let i = 0; i < 5; i++) {
                gameState.roster.push({
                    name: names[Math.floor(Math.random() * names.length)] + ' ' + lastNames[Math.floor(Math.random() * lastNames.length)],
                    position: positions[i],
                    overall: Math.floor(Math.random() * 20) + 65,
                    ppg: Math.floor(Math.random() * 15) + 10,
                    rpg: Math.floor(Math.random() * 8) + 3,
                    apg: Math.floor(Math.random() * 6) + 2
                });
            }
            updateRoster();
        }

        // Update roster display
        function updateRoster() {
            const rosterDiv = document.getElementById('roster');
            rosterDiv.innerHTML = '';
            
            gameState.roster.forEach(player => {
                const card = document.createElement('div');
                card.className = 'player-card';
                card.innerHTML = `
                    <div class="player-info">
                        <div class="player-name">${player.name}</div>
                        <div class="player-details">${player.position} | Overall: ${player.overall}</div>
                    </div>
                    <div class="player-stats">
                        <div class="player-stat">
                            <div class="player-stat-label">PPG</div>
                            <div class="player-stat-value">${player.ppg}</div>
                        </div>
                        <div class="player-stat">
                            <div class="player-stat-label">RPG</div>
                            <div class="player-stat-value">${player.rpg}</div>
                        </div>
                        <div class="player-stat">
                            <div class="player-stat-label">APG</div>
                            <div class="player-stat-value">${player.apg}</div>
                        </div>
                    </div>
                `;
                rosterDiv.appendChild(card);
            });
            
            updateTeamRating();
        }

        // Update team rating
        function updateTeamRating() {
            const avgRating = Math.floor(gameState.roster.reduce((sum, p) => sum + p.overall, 0) / gameState.roster.length);
            document.getElementById('teamRating').textContent = avgRating;
        }

        // Simulate a game
        function simulateGame() {
            const teamRating = parseInt(document.getElementById('teamRating').textContent);
            const opponentRating = Math.floor(Math.random() * 30) + 60;
            
            const winChance = teamRating / (teamRating + opponentRating);
            const won = Math.random() < winChance;
            
            if (won) {
                gameState.wins++;
                addLog(`✅ WIN! Defeated opponent (${opponentRating} OVR) ${105 + Math.floor(Math.random() * 20)}-${90 + Math.floor(Math.random() * 20)}`);
            } else {
                gameState.losses++;
                addLog(`❌ LOSS. Lost to opponent (${opponentRating} OVR) ${90 + Math.floor(Math.random() * 20)}-${105 + Math.floor(Math.random() * 20)}`);
            }
            
            updateStats();
        }

        // Simulate a week
        function simulateWeek() {
            for (let i = 0; i < 3; i++) {
                simulateGame();
            }
            gameState.week++;
            document.getElementById('season').textContent = `Season ${gameState.season} | Week ${gameState.week}`;
        }

        // Generate a new player
        function generatePlayer() {
            const names = ['Marcus', 'Derek', 'Chris', 'Anthony', 'Brandon', 'Ryan', 'Tyler', 'Jordan', 'Alex', 'Jason'];
            const lastNames = ['Thomas', 'Jackson', 'White', 'Harris', 'Martin', 'Garcia', 'Rodriguez', 'Lewis', 'Walker', 'Hall'];
            const positions = ['PG', 'SG', 'SF', 'PF', 'C'];
            
            const newPlayer = {
                name: names[Math.floor(Math.random() * names.length)] + ' ' + lastNames[Math.floor(Math.random() * lastNames.length)],
                position: positions[Math.floor(Math.random() * positions.length)],
                overall: Math.floor(Math.random() * 30) + 60,
                ppg: Math.floor(Math.random() * 20) + 5,
                rpg: Math.floor(Math.random() * 10) + 2,
                apg: Math.floor(Math.random() * 8) + 1
            };
            
            gameState.roster.push(newPlayer);
            addLog(`🔍 Scouted ${newPlayer.name} (${newPlayer.position}, ${newPlayer.overall} OVR)`);
            updateRoster();
        }

        // Add log entry
        function addLog(message) {
            const logDiv = document.getElementById('gameLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = message;
            logDiv.insertBefore(entry, logDiv.firstChild);
            
            // Keep only last 10 entries
            while (logDiv.children.length > 10) {
                logDiv.removeChild(logDiv.lastChild);
            }
        }

        // Update stats display
        function updateStats() {
            document.getElementById('wins').textContent = gameState.wins;
            document.getElementById('losses').textContent = gameState.losses;
        }

        // Initialize game
        initializeRoster();
        addLog('🏀 Welcome to Basketball GM Simulator!');
    </script>
</body>
</html>
