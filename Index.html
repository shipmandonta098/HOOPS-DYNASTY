<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hoops Dynasty - Basketball Management Sim</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 20px;
    }
    .header {
      background: #1e293b;
      padding: 20px;
      margin: -20px -20px 20px -20px;
      border-bottom: 3px solid #3b82f6;
    }
    .how-to {
      background: #1e3a5f;
      border-left: 4px solid #3b82f6;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.6;
    }
    .how-to strong { color: #60a5fa; }
    button {
      padding: 10px 16px;
      margin: 5px 5px 5px 0;
      font-weight: 600;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
    }
    button:hover { background: #2563eb; }
    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }
    .section {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #334155;
    }
    h1 { margin: 0; color: #3b82f6; }
    h2 { 
      margin-top: 0; 
      color: #60a5fa; 
      font-size: 20px;
      border-bottom: 2px solid #334155;
      padding-bottom: 8px;
    }
    h3 { color: #93c5fd; margin-top: 0; }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
      font-size: 13px;
    }
    th, td {
      border: 1px solid #334155;
      padding: 8px 6px;
      text-align: center;
    }
    th {
      background: #0f172a;
      font-weight: 600;
      color: #93c5fd;
    }
    tr:hover { background: #0f172a; }
    .clickable { cursor: pointer; color: #60a5fa; text-decoration: underline; }
    .clickable:hover { color: #93c5fd; }
    select {
      padding: 8px;
      margin: 5px 0;
      background: #0f172a;
      color: #e5e7eb;
      border: 1px solid #334155;
      border-radius: 4px;
      font-size: 14px;
    }
    .tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 10px 16px;
      cursor: pointer;
      background: #334155;
      border-radius: 4px 4px 0 0;
      font-weight: 600;
    }
    .tab.active { background: #3b82f6; }
    .tab:hover { background: #475569; }
    .tab.active:hover { background: #3b82f6; }
    .info-box {
      background: #0f172a;
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
      border: 1px solid #334155;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin: 10px 0;
    }
    .stat-item {
      background: #0f172a;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #334155;
    }
    .stat-label { 
      font-size: 11px; 
      color: #94a3b8; 
      text-transform: uppercase;
    }
    .stat-value { 
      font-size: 18px; 
      font-weight: bold; 
      color: #60a5fa;
    }
    .good { color: #4ade80; }
    .bad { color: #f87171; }
    .warning { color: #fbbf24; }
    input[type="text"] {
      padding: 6px;
      background: #0f172a;
      color: #e5e7eb;
      border: 1px solid #334155;
      border-radius: 4px;
    }
    .player-card {
      background: #1e293b;
      padding: 15px;
      border-radius: 6px;
      border: 2px solid #3b82f6;
      margin-top: 10px;
    }
    .ratings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 8px;
      margin: 10px 0;
    }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1e293b;
      padding: 20px;
      border-radius: 8px;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      border: 2px solid #3b82f6;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #93c5fd;
      font-weight: 600;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px;
      background: #0f172a;
      color: #e5e7eb;
      border: 1px solid #334155;
      border-radius: 4px;
      font-size: 14px;
    }
    .hero-logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
    }
    .hero-title {
      font-size: 48px;
      font-weight: 800;
      margin: 0 0 10px 0;
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    .hero-subtitle {
      font-size: 20px;
      color: #94a3b8;
      margin: 0 0 50px 0;
      font-weight: 300;
    }
    .btn-primary {
      font-size: 20px;
      padding: 18px 50px;
      margin: 15px 0;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
      transition: all 0.3s;
      display: block;
      width: 100%;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
    }
    .btn-secondary {
      font-size: 16px;
      padding: 14px 40px;
      margin: 10px 0;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      color: #e5e7eb;
      transition: all 0.3s;
      display: block;
      width: 100%;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    .btn-secondary:hover:not(:disabled) {
      border-color: #3b82f6;
      background: #0f172a;
    }
    .btn-secondary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .helper-text {
      font-size: 13px;
      color: #64748b;
      margin-top: -10px;
      margin-bottom: 20px;
    }
    .feature-list {
      margin-top: 60px;
      padding-top: 30px;
      border-top: 1px solid #334155;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .feature-item {
      display: flex;
      align-items: center;
      margin: 15px 0;
      color: #94a3b8;
      font-size: 15px;
    }
    .feature-icon {
      font-size: 24px;
      margin-right: 12px;
      width: 30px;
      text-align: center;
    }
    @media (max-width: 600px) {
      .hero-title { font-size: 36px; }
      .hero-subtitle { font-size: 16px; }
      .hero-logo { width: 100px; height: 100px; font-size: 50px; }
    }
    .setup-header {
      background: #1e293b;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      border-bottom: 2px solid #334155;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .setup-header h2 {
      margin: 0;
      border: none;
      padding: 0;
      flex: 1;
    }
    .back-btn {
      background: #334155;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      border: none;
      color: #e5e7eb;
      font-size: 14px;
    }
    .back-btn:hover {
      background: #475569;
    }
    .setup-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    .setup-section {
      background: #1e293b;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: 1px solid #334155;
    }
    .setup-section h3 {
      margin-top: 0;
      color: #60a5fa;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .input-wrapper {
      margin-bottom: 20px;
    }
    .input-wrapper label {
      display: block;
      margin-bottom: 8px;
      color: #93c5fd;
      font-weight: 600;
      font-size: 14px;
    }
    .input-wrapper input {
      width: 100%;
      padding: 12px;
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 6px;
      color: #e5e7eb;
      font-size: 16px;
      transition: border-color 0.2s;
    }
    .input-wrapper input:focus {
      outline: none;
      border-color: #3b82f6;
    }
    .char-count {
      text-align: right;
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }
    .setup-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #334155;
    }
    .setup-tab {
      padding: 12px 24px;
      background: transparent;
      border: none;
      color: #94a3b8;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .setup-tab.active {
      color: #60a5fa;
      border-bottom-color: #3b82f6;
    }
    .setup-tab:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 15px;
    }
    @media (max-width: 768px) {
      .team-grid {
        grid-template-columns: 1fr;
      }
    }
    .team-card {
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 8px;
      padding: 16px;
      transition: all 0.2s;
      text-align: left;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
    }
    .team-card:hover {
      border-color: #475569;
      transform: translateY(-2px);
    }
    .team-card.selected {
      border-color: #3b82f6;
      background: #1e293b;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    .team-logo-wrapper {
      cursor: pointer;
    }
    .team-logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }
    .team-card-content {
      min-width: 0;
      cursor: pointer;
    }
    .team-card-name {
      font-weight: 700;
      font-size: 16px;
      color: #e5e7eb;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.3;
    }
    .team-card-info {
      font-size: 13px;
      color: #64748b;
      line-height: 1.5;
    }
    .team-card-meta-line {
      margin-bottom: 2px;
    }
    .team-card-actions {
      display: flex;
      align-items: center;
    }
    .btn-edit-team {
      background: transparent;
      border: 1px solid #475569;
      color: #94a3b8;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .btn-edit-team:hover {
      border-color: #3b82f6;
      color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
    }
    .color-dots {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .color-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #334155;
    }
    /* Edit Team Page Styles */
    #editTeam-screen {
      display: none;
      height: 100vh;
      overflow-y: auto;
      background: linear-gradient(to bottom, #0f172a 0%, #1e293b 100%);
    }
    .edit-header {
      background: #0f172a;
      padding: 20px;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 15px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .edit-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 24px 20px;
    }
    .edit-section {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .edit-section h3 {
      color: #e5e7eb;
      font-size: 18px;
      margin: 0 0 16px 0;
      font-weight: 600;
    }
    .edit-field {
      margin-bottom: 16px;
    }
    .edit-field:last-child {
      margin-bottom: 0;
    }
    .edit-field label {
      display: block;
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .edit-field-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .edit-field input[type=\"text\"],\n    .edit-field input[type=\"url\"] {
      flex: 1;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 6px;
      padding: 10px 12px;
      color: #e5e7eb;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    .edit-field input:focus {
      outline: none;
      border-color: #3b82f6;
    }
    .logo-preview {
      width: 48px;
      height: 48px;
      border-radius: 4px;
      border: 2px solid #334155;
      object-fit: cover;
      flex-shrink: 0;
      background: #1e293b;
    }
    .logo-preview.placeholder {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
    }
    .color-preview {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      border: 2px solid #334155;
      flex-shrink: 0;
    }
    .readonly-info {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 14px;
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.6;
    }
    .edit-footer {
      position: sticky;
      bottom: 0;
      background: #0f172a;
      border-top: 1px solid #334155;
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .btn-save,
    .btn-cancel-edit {
      padding: 12px 32px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .btn-save {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
    }
    .btn-save:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }
    .btn-cancel-edit {
      background: transparent;
      border: 2px solid #475569;
      color: #94a3b8;
    }
    .btn-cancel-edit:hover {
      border-color: #64748b;
      color: #cbd5e1;
    }
    /* Dashboard Styles */
    .dashboard-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    .dashboard-header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .dashboard-team-logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #334155;
      flex-shrink: 0;
    }
    .dashboard-team-logo.placeholder {
      background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
    }
    .dashboard-team-info {
      flex: 1;
      min-width: 0;
    }
    .dashboard-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .dashboard-team-name {
      font-size: 24px;
      font-weight: 700;
      color: #e5e7eb;
      margin-bottom: 6px;
    }
    .dashboard-team-meta {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .dashboard-record-row {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .dashboard-stat-pill {
      background: #334155;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      color: #e5e7eb;
      font-weight: 600;
    }
    .dashboard-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .dashboard-card-title {
      font-size: 16px;
      font-weight: 700;
      color: #e5e7eb;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dashboard-ratings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .dashboard-rating-item {
      text-align: center;
    }
    .dashboard-rating-circle {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      font-size: 24px;
      font-weight: 700;
      color: white;
      border: 3px solid #1e3a8a;
    }
    .dashboard-rating-label {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 600;
    }
    .dashboard-efficiency-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .dashboard-efficiency-item {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .dashboard-efficiency-value {
      font-size: 28px;
      font-weight: 700;
      color: #3b82f6;
      margin-bottom: 6px;
    }
    .dashboard-efficiency-label {
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .dashboard-player-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .dashboard-player-rank {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #94a3b8;
      flex-shrink: 0;
    }
    .dashboard-player-info {
      flex: 1;
      min-width: 0;
    }
    .dashboard-player-name {
      font-size: 15px;
      font-weight: 600;
      color: #e5e7eb;
      margin-bottom: 2px;
    }
    .dashboard-player-pos {
      font-size: 12px;
      color: #64748b;
    }
    .dashboard-player-stat {
      font-size: 13px;
      color: #94a3b8;
      margin-right: 8px;
    }
    .dashboard-player-ovr {
      font-size: 24px;
      font-weight: 700;
      color: #3b82f6;
      flex-shrink: 0;
    }
    .dashboard-cap-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .dashboard-cap-label {
      color: #94a3b8;
    }
    .dashboard-cap-value {
      color: #e5e7eb;
      font-weight: 600;
    }
    .dashboard-cap-bar {
      height: 24px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    .dashboard-cap-fill {
      height: 100%;
      border-radius: 12px;
      transition: width 0.3s ease;
    }
    .dashboard-cap-fill.under {
      background: linear-gradient(90deg, #10b981 0%, #059669 100%);
    }
    .dashboard-cap-fill.over {
      background: linear-gradient(90deg, #ef4444 0%, #dc2626 100%);
    }
    .dashboard-alert {
      background: #7f1d1d;
      border: 1px solid #991b1b;
      border-radius: 8px;
      padding: 12px 16px;
      color: #fca5a5;
      font-size: 14px;
      font-weight: 600;
      margin-top: 12px;
      text-align: center;
    }
    .btn-simulate-week {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
      transition: all 0.2s;
    }

// Generate SVG logo for a team
function generateTeamLogo(teamName, colors) {
  // Get initials from team name (e.g., "New York Comets" -> "NYC")
  const words = teamName.split(' ');
  let initials = '';
  
  if (words.length === 1) {
    initials = words[0].substring(0, 2).toUpperCase();
  } else if (words.length === 2) {
    initials = words[0][0] + words[1][0];
  } else {
    initials = words[0][0] + words[1][0] + words[2][0];
  }
  initials = initials.toUpperCase();
  
  const svg = `
    <svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="grad-${initials}" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:${colors.primary};stop-opacity:1" />
          <stop offset="100%" style="stop-color:${colors.secondary};stop-opacity:1" />
        </linearGradient>
      </defs>
      <circle cx="24" cy="24" r="23" fill="url(#grad-${initials})" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <text x="24" y="24" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="central">${initials}</text>
    </svg>
  `;
  
  return `data:image/svg+xml;base64,${btoa(svg)}`;
}

let league = null;
let appView = 'home'; // 'home', 'myLeagues', 'newLeague', 'editTeam', or 'league'

// ----- IndexedDB helpers -----
const DB_NAME = "HoopsDynastyDB";
const STORE = "leagues";
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);

    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) {
        db.createObjectStore(STORE, { keyPath: "id" });
      }
    };

    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveLeague() {
  if (!league) return;
  
  // Ensure league has an ID
  if (!league.id) {
    league.id = 'league_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  }
  
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).put({
      id: league.id,
      name: league.name || 'My League',
      season: league.season,
      userTeamId: selectedTeamId,
      updatedAt: Date.now(),
      league: league
    });
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

async function listLeagues() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readonly");
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => {
      const leagues = req.result.sort((a, b) => b.updatedAt - a.updatedAt);
      resolve(leagues);
    };
    req.onerror = () => reject(req.error);
  });
}

async function loadLeague(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readonly");
    const req = tx.objectStore(STORE).get(id);
    req.onsuccess = () => {
      const result = req.result?.league ?? null;
      if (result) {
        league = result;
        nextPlayerId = Math.max(...league.teams.flatMap(t => t.players.map(p => p.id)), 
                                ...league.freeAgents.map(p => p.id)) + 1;
        selectedTeamId = req.result.userTeamId || league.teams[0].id;
        appView = 'league';
        render();
      }
      resolve(result);
    };
    req.onerror = () => reject(req.error);
  });
}

async function deleteLeague(id) {
  const db = await openDB();

    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });

async function renameLeague(id) {
  const newName = prompt('Enter new league name:');
  if (!newName || !newName.trim()) return;
  
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    const getReq = tx.objectStore(STORE).get(id);
    
    getReq.onsuccess = () => {
      const record = getReq.result;
      if (record) {
        record.name = newName.trim();
        record.league.name = newName.trim();
        tx.objectStore(STORE).put(record);
      }
    };
    
    tx.oncomplete = () => {
      if (league && league.id === id) {
        league.name = newName.trim();
      }
      render();
      resolve(true);
    };
    tx.onerror = () => reject(tx.error);
  });
}

function exportLeague(id) {
  listLeagues().then(leagues => {
    const record = leagues.find(l => l.id === id);
    if (!record) return;
    
    const dataStr = JSON.stringify(record, null, 2);
    const dataBlob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(dataBlob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `${record.name.replace(/[^a-z0-9]/gi, '_')}_Season${record.season}.json`;
    link.click();
    URL.revokeObjectURL(url);
  });
}

function importLeague() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      
      // Validate minimal fields
      if (!data.league || !data.league.teams || !data.league.season) {
        alert('Invalid league file format');
        return;
      }
      
      // Generate new ID to avoid conflicts
      data.id = 'league_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      data.league.id = data.id;
      data.updatedAt = Date.now();
      data.name = data.name || 'Imported League';
      
      // Save to IndexedDB
      const db = await openDB();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readwrite");
        tx.objectStore(STORE).put(data);
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error);
      });
      
      alert('League imported successfully!');
      render();
    } catch (err) {
      alert('Failed to import league: ' + err.message);
    }
  };
  input.click();
}

/* ============================

============================ */

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function randFloat(min, max) {
  return Math.random() * (max - min) + min;
}

function clamp(val, min, max) {
  return Math.max(min, Math.min(max, val));
}

function randName() {
  const first = ["James", "Michael", "Kobe", "LeBron", "Stephen", "Kevin", "Chris", "Anthony", "Dwyane", "Russell", "Tim", "Larry", "Magic", "Kareem", "Shaq", "Allen", "Ray", "Paul", "Dirk", "Hakeem", "Charles", "John", "Karl", "Moses", "David"];
  const last = ["Johnson", "Williams", "Brown", "Jones", "Davis", "Miller", "Wilson", "Moore", "Taylor", "Anderson", "Thomas", "Jackson", "White", "Harris", "Martin", "Thompson", "Garcia", "Martinez", "Robinson", "Clark", "Rodriguez", "Lewis", "Lee", "Walker", "Hall"];
  return `${first[rand(0, first.length - 1)]} ${last[rand(0, last.length - 1)]}`;
}

/* ============================
   PLAYER GENERATION
============================ */

function makePlayer(age, isRookie = false) {
  const id = nextPlayerId++;
  const pos = POS[rand(0, POS.length - 1)];
  
  // Base ratings
  let shoot = rand(30, 85);
  let defense = rand(30, 85);
  let rebound = rand(30, 85);
  let passing = rand(30, 85);
  
  if (isRookie) {
    // Rookies have more variance and generally lower ratings
    shoot = clamp(rand(40, 75) + rand(-15, 15), 35, 90);
    defense = clamp(rand(40, 75) + rand(-15, 15), 35, 90);
    rebound = clamp(rand(40, 75) + rand(-15, 15), 35, 90);
    passing = clamp(rand(40, 75) + rand(-15, 15), 35, 90);
  }
  
  const ovr = Math.round((shoot + defense + rebound + passing) / 4);
  const pot = isRookie ? clamp(ovr + rand(0, 25), ovr, 95) : clamp(ovr + rand(-5, 10), ovr - 5, 95);
  
  // Contract based on OVR
  const salary = calculateSalary(ovr);
  
  return {
    id,
    name: randName(),
    age,
    pos,
    ratings: {
      ovr,
      pot,
      shoot,
      defense,
      rebound,
      passing
    },
    contract: {
      amount: salary,
      exp: league ? league.season + rand(1, 4) : 2026 + rand(1, 4)
    },
    seasonStats: {
      gp: 0,
      pts: 0,
      reb: 0,
      ast: 0,
      fgm: 0,
      fga: 0,
      fg3m: 0,
      fg3a: 0
    }
  };
}

function calculateSalary(ovr) {
  if (ovr >= 85) return rand(25, 40);
  if (ovr >= 75) return rand(15, 25);
  if (ovr >= 65) return rand(8, 15);
  if (ovr >= 55) return rand(3, 8);
  return rand(1, 3);
}

function makeTeam(id, name, metadata = {}) {
  const players = [];
  for (let i = 0; i < 12; i++) {
    const age = rand(19, 34);
    players.push(makePlayer(age));
  }
  
  return {
    id,
    name,
    city: metadata.city || '',
    conference: metadata.conference || '—',
    division: metadata.division || '—',
    market: metadata.market || '—',
    primaryColor: metadata.primaryColor || '#3b82f6',
    secondaryColor: metadata.secondaryColor || '#1e293b',
    logoPrimaryUrl: metadata.logoPrimaryUrl || '',
    logoSecondaryUrl: metadata.logoSecondaryUrl || '',
    wins: 0,
    losses: 0,
    players,
    payroll: 0
  };
}

function generateDraftClass() {
  const draftClass = [];
  for (let i = 0; i < 20; i++) {
    const age = rand(19, 22);
    draftClass.push(makePlayer(age, true));
  }
  return draftClass.sort((a, b) => b.ratings.pot - a.ratings.pot);
}

function createLeague(leagueName = 'My League', teamCount = 30, seasonYear = 2026) {
  nextPlayerId = 1;
  const teams = [];
  
  for (let i = 0; i < Math.min(teamCount, 30); i++) {
    // Use customized team from newLeagueState if available, otherwise use TEAM_META
    const teamMeta = newLeagueState.teams.length > i ? newLeagueState.teams[i] : TEAM_META[i];
    if (teamMeta) {
      const fullName = `${teamMeta.city} ${teamMeta.name}`;
      teams.push(makeTeam(i + 1, fullName, {
        city: teamMeta.city,
        conference: teamMeta.conference,
        division: teamMeta.division,
        market: teamMeta.market,
        primaryColor: teamMeta.primaryColor,
        secondaryColor: teamMeta.secondaryColor,
        logoPrimaryUrl: teamMeta.logoPrimaryUrl,
        logoSecondaryUrl: teamMeta.logoSecondaryUrl
      }));
    } else {
      teams.push(makeTeam(i + 1, `Team ${i + 1}`, {}));
    }
  }
  
  league = {
    id: 'league_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
    name: leagueName,
    season: seasonYear,
    phase: 'preseason', // preseason, season, offseason, draft
    teams,
    freeAgents: [],
    history: [],
    draftClass: []
  };
  
  updateTeamPayrolls();
  selectedTeamId = teams[0].id;
  appView = 'league';
  render();
  save();
}

function updateTeamPayrolls() {
  league.teams.forEach(team => {
    team.payroll = team.players.reduce((sum, p) => sum + p.contract.amount, 0);
  });
}

/* ============================
   TEAM STATS & METRICS
============================ */

function getTeamOverall(team) {
  const topPlayers = team.players
    .sort((a, b) => b.ratings.ovr - a.ratings.ovr)
    .slice(0, 8);
  
  if (topPlayers.length === 0) return 50;
  
  const totalOvr = topPlayers.reduce((sum, p) => sum + p.ratings.ovr, 0);
  return Math.round(totalOvr / topPlayers.length);
}

function getTeamOffense(team) {
  const topPlayers = team.players
    .sort((a, b) => b.ratings.ovr - a.ratings.ovr)
    .slice(0, 8);
  
  if (topPlayers.length === 0) return 50;
  
  const totalShoot = topPlayers.reduce((sum, p) => sum + p.ratings.shoot, 0);
  return Math.round(totalShoot / topPlayers.length);
}

function getTeamDefense(team) {
  const topPlayers = team.players
    .sort((a, b) => b.ratings.ovr - a.ratings.ovr)
    .slice(0, 8);
  
  if (topPlayers.length === 0) return 50;
  
  const totalDef = topPlayers.reduce((sum, p) => sum + p.ratings.defense, 0);
  return Math.round(totalDef / topPlayers.length);
}

function getPowerRank(teamId) {
  const rankedTeams = league.teams
    .map(t => ({ id: t.id, overall: getTeamOverall(t) }))
    .sort((a, b) => b.overall - a.overall);
  
  const rank = rankedTeams.findIndex(t => t.id === teamId) + 1;
  return rank;
}

function getTeamEfficiencyStats(team) {
  const offense = getTeamOffense(team);
  const defense = getTeamDefense(team);
  
  // Proxy metrics based on ratings (stable per team)
  const efg = Math.round(45 + (offense - 70) * 0.2); // ~45-55%
  const tov = Math.round(18 - (offense - 70) * 0.1); // ~13-23%
  const orb = Math.round(25 + (defense - 70) * 0.15); // ~20-30%
  const ftRate = Math.round(20 + (offense - 70) * 0.12); // ~15-25%
  
  return {
    efg: Math.max(40, Math.min(60, efg)),
    tov: Math.max(10, Math.min(25, tov)),
    orb: Math.max(15, Math.min(35, orb)),
    ftRate: Math.max(10, Math.min(30, ftRate))
  };
}

/* ============================
   GAME SIMULATION
============================ */

function simGame(teamA, teamB) {
  const possessions = 95;
  let scoreA = 0;
  let scoreB = 0;
  
  // Get rotation (top 8 players by OVR)
  const rotationA = teamA.players.sort((a, b) => b.ratings.ovr - a.ratings.ovr).slice(0, 8);
  const rotationB = teamB.players.sort((a, b) => b.ratings.ovr - a.ratings.ovr).slice(0, 8);
  
  // Initialize minutes tracker
  const minutes = new Map();
  rotationA.forEach(p => minutes.set(p.id, 0));
  rotationB.forEach(p => minutes.set(p.id, 0));
  
  // Team defensive ratings
  const defA = rotationA.reduce((sum, p) => sum + p.ratings.defense, 0) / rotationA.length;
  const defB = rotationB.reduce((sum, p) => sum + p.ratings.defense, 0) / rotationB.length;
  
  for (let poss = 0; poss < possessions; poss++) {
    // Team A possession
    const shooterA = pickShooter(rotationA, poss, possessions);
    const resultA = simulatePossession(shooterA, defB, poss, possessions, minutes);
    scoreA += resultA.points;
    updatePlayerStats(shooterA, resultA);
    
    // Team B possession
    const shooterB = pickShooter(rotationB, poss, possessions);
    const resultB = simulatePossession(shooterB, defA, poss, possessions, minutes);
    scoreB += resultB.points;
    updatePlayerStats(shooterB, resultB);
  }
  
  // Update team records
  if (scoreA > scoreB) {
    teamA.wins++;
    teamB.losses++;
  } else {
    teamB.wins++;
    teamA.losses++;
  }
  
  // Mark game played
  rotationA.forEach(p => p.seasonStats.gp++);
  rotationB.forEach(p => p.seasonStats.gp++);
}

function pickShooter(rotation, currentPoss, totalPoss) {
  // Weight by OVR
  const weights = rotation.map(p => p.ratings.ovr);
  const totalWeight = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * totalWeight;
  
  for (let i = 0; i < rotation.length; i++) {
    r -= weights[i];
    if (r <= 0) return rotation[i];
  }
  return rotation[0];
}

function simulatePossession(shooter, oppDef, currentPoss, totalPoss, minutesMap) {
  const fatigueMultiplier = calculateFatigue(shooter, currentPoss, totalPoss, minutesMap);
  const adjustedShoot = shooter.ratings.shoot * fatigueMultiplier;
  
  // Determine shot type
  const is3PT = Math.random() < 0.35; // 35% of shots are 3s
  const shotDifficulty = is3PT ? 0.35 : 0.50;
  
  // Make chance based on shooter skill vs defense
  const makeChance = clamp((adjustedShoot - oppDef * 0.3) / 100 * shotDifficulty, 0.1, 0.7);
  const made = Math.random() < makeChance;
  
  // Track minutes
  minutesMap.set(shooter.id, (minutesMap.get(shooter.id) || 0) + 1);
  
  // Simple rebound/assist simulation
  const reb = Math.random() < 0.15 ? 1 : 0;
  const ast = Math.random() < 0.12 ? 1 : 0;
  
  return {
    points: made ? (is3PT ? 3 : 2) : 0,
    fgm: made ? 1 : 0,
    fga: 1,
    fg3m: (made && is3PT) ? 1 : 0,
    fg3a: is3PT ? 1 : 0,
    reb,
    ast
  };
}

function calculateFatigue(player, currentPoss, totalPoss, minutesMap) {
  const minutesPlayed = minutesMap.get(player.id) || 0;
  const gameProgress = currentPoss / totalPoss;
  
  // If playing heavy minutes in late game, slight fatigue penalty
  if (gameProgress > 0.75 && minutesPlayed > 40) {
    return 0.95; // 5% penalty
  }
  return 1.0;
}

function updatePlayerStats(player, result) {
  player.seasonStats.pts += result.points;
  player.seasonStats.fgm += result.fgm;
  player.seasonStats.fga += result.fga;
  player.seasonStats.fg3m += result.fg3m;
  player.seasonStats.fg3a += result.fg3a;
  player.seasonStats.reb += result.reb;
  player.seasonStats.ast += result.ast;
}

/* ============================
   SEASON SIMULATION
============================ */

function simRegularSeason() {
  if (!league) return;
  
  // Reset season stats
  league.teams.forEach(team => {
    team.wins = 0;
    team.losses = 0;
    team.players.forEach(p => {
      p.seasonStats = { gp: 0, pts: 0, reb: 0, ast: 0, fgm: 0, fga: 0, fg3m: 0, fg3a: 0 };
    });
  });
  
  // Each team plays each other 4 times (home/away)
  const teams = league.teams;
  for (let i = 0; i < teams.length; i++) {
    for (let j = i + 1; j < teams.length; j++) {
      for (let k = 0; k < 4; k++) {
        simGame(teams[i], teams[j]);
      }
    }
  }
  
  league.phase = 'offseason';
  
  // Save season to history
  saveSeasonToHistory();
  
  render();
  alert('Regular season complete! Proceed to Offseason.');
  save();
}

function saveSeasonToHistory() {
  const standings = [...league.teams].sort((a, b) => b.wins - a.wins);
  const champion = standings[0];
  
  // Find stat leaders
  const allPlayers = league.teams.flatMap(t => t.players);
  const scoringLeader = [...allPlayers].sort((a, b) => {
    const ppgA = a.seasonStats.gp > 0 ? a.seasonStats.pts / a.seasonStats.gp : 0;
    const ppgB = b.seasonStats.gp > 0 ? b.seasonStats.pts / b.seasonStats.gp : 0;
    return ppgB - ppgA;
  })[0];
  
  league.history.push({
    season: league.season,
    champion: champion.name,
    championRecord: `${champion.wins}-${champion.losses}`,
    scoringLeader: scoringLeader ? {
      name: scoringLeader.name,
      ppg: (scoringLeader.seasonStats.pts / scoringLeader.seasonStats.gp).toFixed(1)
    } : null,
    standings: standings.map(t => ({ name: t.name, wins: t.wins, losses: t.losses }))
  });
}

/* ============================
   PLAYER PROGRESSION
============================ */

function progressPlayers() {
  league.teams.forEach(team => {
    team.players.forEach(player => {
      player.age++;
      
      // Age curve
      let growthFactor = 0;
      if (player.age >= 19 && player.age <= 23) {
        growthFactor = randFloat(0, 3);
        // Chance of big leap if POT > OVR
        if (player.ratings.pot > player.ratings.ovr && Math.random() < 0.3) {
          growthFactor += randFloat(3, 8);
        }
      } else if (player.age >= 24 && player.age <= 29) {
        growthFactor = randFloat(-1, 1);
      } else if (player.age >= 30) {
        growthFactor = randFloat(-5, -1);
      }
      
      // Apply to each rating
      player.ratings.shoot = clamp(player.ratings.shoot + growthFactor + randFloat(-2, 2), 30, 100);
      player.ratings.defense = clamp(player.ratings.defense + growthFactor + randFloat(-2, 2), 30, 100);
      player.ratings.rebound = clamp(player.ratings.rebound + growthFactor + randFloat(-2, 2), 30, 100);
      player.ratings.passing = clamp(player.ratings.passing + growthFactor + randFloat(-2, 2), 30, 100);
      
      // Recalculate OVR
      player.ratings.ovr = Math.round((player.ratings.shoot + player.ratings.defense + 
                                       player.ratings.rebound + player.ratings.passing) / 4);
      player.ratings.ovr = clamp(player.ratings.ovr, 30, 100);
    });
  });
}

/* ============================
   CONTRACTS & FREE AGENCY
============================ */

function runOffseason() {
  if (!league || league.phase !== 'offseason') {
    alert('Not in offseason phase!');
    return;
  }
  
  // Progress players (age + ratings)
  progressPlayers();
  
  // Handle expiring contracts
  handleExpiringContracts();
  
  // Re-sign phase
  resignPlayers();
  
  // Free agency
  freeAgencySignings();
  
  updateTeamPayrolls();
  league.phase = 'draft';
  
  // Generate draft class
  league.draftClass = generateDraftClass();
  
  render();
  alert('Offseason complete! Proceed to Draft.');
  save();
}

function handleExpiringContracts() {
  league.teams.forEach(team => {
    const expiring = team.players.filter(p => p.contract.exp <= league.season);
    expiring.forEach(p => {
      league.freeAgents.push(p);
    });
    team.players = team.players.filter(p => p.contract.exp > league.season);
  });
}

function resignPlayers() {
  league.teams.forEach(team => {
    const capSpace = SALARY_CAP - team.players.reduce((sum, p) => sum + p.contract.amount, 0);
    
    // Try to re-sign top free agents from this team
    const teamFAs = league.freeAgents.filter(fa => {
      // Check if player was on this team (simple heuristic: if team has < 12 players)
      return team.players.length < 12;
    }).sort((a, b) => b.ratings.ovr - a.ratings.ovr);
    
    for (let fa of teamFAs) {
      if (team.players.length >= 15) break;
      
      const newSalary = calculateSalary(fa.ratings.ovr);
      const currentPayroll = team.players.reduce((sum, p) => sum + p.contract.amount, 0);
      
      if (currentPayroll + newSalary <= SALARY_CAP * 1.1) { // 10% luxury tax tolerance
        fa.contract = {
          amount: newSalary,
          exp: league.season + rand(1, 4)
        };
        team.players.push(fa);
        league.freeAgents = league.freeAgents.filter(p => p.id !== fa.id);
      }
    }
  });
}

function freeAgencySignings() {
  // Remaining free agents sign minimum deals with teams under cap
  league.freeAgents.sort((a, b) => b.ratings.ovr - a.ratings.ovr);
  
  for (let fa of [...league.freeAgents]) {
    const teamsWithSpace = league.teams.filter(t => {
      const payroll = t.players.reduce((sum, p) => sum + p.contract.amount, 0);
      return payroll < SALARY_CAP && t.players.length < 15;
    }).sort((a, b) => {
      const payA = a.players.reduce((sum, p) => sum + p.contract.amount, 0);
      const payB = b.players.reduce((sum, p) => sum + p.contract.amount, 0);
      return payA - payB; // Teams with more space go first
    });
    
    if (teamsWithSpace.length > 0) {
      const team = teamsWithSpace[0];
      fa.contract = {
        amount: MIN_SALARY,
        exp: league.season + 1
      };
      team.players.push(fa);
      league.freeAgents = league.freeAgents.filter(p => p.id !== fa.id);
    }
  }
}

/* ============================
   DRAFT
============================ */

function runDraft() {
  if (!league || league.phase !== 'draft') {
    alert('Not in draft phase!');
    return;
  }
  
  // Draft order: reverse standings
  const draftOrder = [...league.teams].sort((a, b) => a.wins - b.wins);
  
  for (let i = 0; i < draftOrder.length && i < league.draftClass.length; i++) {
    const team = draftOrder[i];
    const pick = league.draftClass[i];
    
    pick.contract = {
      amount: rand(2, 5), // Rookie scale
      exp: league.season + 4
    };
    
    team.players.push(pick);
  }
  
  league.draftClass = [];
  league.phase = 'preseason';
  league.season++;
  
  updateTeamPayrolls();
  render();
  alert(`Draft complete! Welcome to the ${league.season} season!`);
  save();
}

/* ============================
   TRANSACTIONS
============================ */

function cutPlayer(playerId, teamId) {
  const team = league.teams.find(t => t.id === teamId);
  if (!team) return;
  
  const player = team.players.find(p => p.id === playerId);
  if (!player) return;
  
  if (!confirm(`Cut ${player.name}? (Salary: $${player.contract.amount}M)`)) return;
  
  team.players = team.players.filter(p => p.id !== playerId);
  league.freeAgents.push(player);
  
  updateTeamPayrolls();
  render();
  save();
}

function signFreeAgent(playerId, teamId) {
  const team = league.teams.find(t => t.id === teamId);
  const player = league.freeAgents.find(p => p.id === playerId);
  
  if (!team || !player) return;
  
  const currentPayroll = team.players.reduce((sum, p) => sum + p.contract.amount, 0);
  if (currentPayroll + player.contract.amount > SALARY_CAP) {
    alert('Not enough cap space!');
    return;
  }
  
  if (team.players.length >= 15) {
    alert('Roster full! (Max 15 players)');
    return;
  }
  
  team.players.push(player);
  league.freeAgents = league.freeAgents.filter(p => p.id !== playerId);
  
  updateTeamPayrolls();
  render();
  save();
}

function saveTeamDetails() {
  const city = document.getElementById('teamCity').value.trim().substring(0, 30);
  const name = document.getElementById('teamName').value.trim().substring(0, 30);
  let primaryLogoUrl = document.getElementById('teamLogoPrimary').value.trim();
  let secondaryLogoUrl = document.getElementById('teamLogoSecondary').value.trim();
  let primaryColor = document.getElementById('teamPrimaryColor').value.trim();
  let secondaryColor = document.getElementById('teamSecondaryColor').value.trim();
  
  // Validate and fix color format
  if (primaryColor && !primaryColor.startsWith('#')) {
    primaryColor = '#' + primaryColor;
  }
  if (secondaryColor && !secondaryColor.startsWith('#')) {
    secondaryColor = '#' + secondaryColor;
  }
  
  // Validate hex color format
  const hexPattern = /^#[0-9A-Fa-f]{6}$/;
  if (!hexPattern.test(primaryColor)) {
    primaryColor = newLeagueState.teams[editTeamId - 1].primaryColor;
  }
  if (!hexPattern.test(secondaryColor)) {
    secondaryColor = newLeagueState.teams[editTeamId - 1].secondaryColor;
  }
  
  // Update team in newLeagueState
  newLeagueState.teams[editTeamId - 1] = {
    ...newLeagueState.teams[editTeamId - 1],
    city,
    name,
    logoPrimaryUrl: primaryLogoUrl,
    logoSecondaryUrl: secondaryLogoUrl,
    primaryColor,
    secondaryColor
  };
  
  appView = 'newLeague';
  editTeamId = null;
  render();
}

function simulateWeek() {
  // Simulate 7 games for simplicity (about a week of games)
  const gamesPerWeek = 7;
  for (let i = 0; i < gamesPerWeek && league.phase === 'season'; i++) {
    // Find teams that haven't played 82 games yet
    const teamsToPlay = league.teams.filter(t => (t.wins + t.losses) < 82);
    if (teamsToPlay.length < 2) {
      league.phase = 'offseason';
      break;
    }
    
    // Simulate one round of games
    const used = new Set();
    for (let j = 0; j < Math.floor(teamsToPlay.length / 2); j++) {
      let teamA, teamB;
      do {
        teamA = teamsToPlay[Math.floor(Math.random() * teamsToPlay.length)];
        teamB = teamsToPlay[Math.floor(Math.random() * teamsToPlay.length)];
      } while (teamA === teamB || used.has(teamA.id) || used.has(teamB.id));
      
      used.add(teamA.id);
      used.add(teamB.id);
      
      simGame(teamA, teamB);
    }
  }
  
  render();
}

        <th>Pos</th>
        <th>Age</th>
        <th>OVR</th>
        <th>PPG</th>
        <th>RPG</th>
        <th>APG</th>
        <th>Salary</th>
        <th>Exp</th>
        <th>Action</th>
      </tr>
      ${rows}
    </table>
  `;
}

function renderPlayer() {
  const el = document.getElementById('player-tab');
  el.innerHTML = `
    <h2>Player Details</h2>
    <p>Click on a player's name in the Team Roster tab to view their details.</p>
  `;
}

function renderFreeAgents() {
  const el = document.getElementById('freeagents-tab');
  
  if (league.freeAgents.length === 0) {
    el.innerHTML = `
      <h2>Free Agents</h2>
      <p>No free agents available.</p>
    `;
    return;
  }
  
  const sorted = [...league.freeAgents].sort((a, b) => b.ratings.ovr - a.ratings.ovr);
  
  const rows = sorted.map(p => {
    return `
      <tr>
        <td><span class="clickable" onclick="showPlayerModal(${p.id})">${p.name}</span></td>
        <td>${p.pos}</td>
        <td>${p.age}</td>
        <td>${p.ratings.ovr}</td>
        <td>${p.ratings.pot}</td>
        <td>$${p.contract.amount}M</td>
        <td>
          <select id="teamSelect${p.id}">
            ${league.teams.map(t => `<option value="${t.id}">${t.name}</option>`).join('')}
          </select>
          <button onclick="signFreeAgent(${p.id}, parseInt(document.getElementById('teamSelect${p.id}').value))">Sign</button>
        </td>
      </tr>
    `;
  }).join('');
  
  el.innerHTML = `
    <h2>Free Agents</h2>
    <table>
      <tr>
        <th>Name</th>
        <th>Pos</th>
        <th>Age</th>
        <th>OVR</th>
        <th>POT</th>
        <th>Asking</th>
        <th>Action</th>
      </tr>
      ${rows}
    </table>
  `;
}

// Old renderHistory removed - now using comprehensive renderHistoryView() from app.js

function showPlayerModal(playerId) {
  // Find player
  let player = null;
  let teamName = 'Free Agent';
  
  for (let team of league.teams) {
    const p = team.players.find(pl => pl.id === playerId);
    if (p) {
      player = p;
      teamName = team.name;
      break;
    }
  }
  
  if (!player) {
    player = league.freeAgents.find(p => p.id === playerId);
  }
  
  if (!player) return;
  
  const ppg = player.seasonStats.gp > 0 ? (player.seasonStats.pts / player.seasonStats.gp).toFixed(1) : '0.0';
  const rpg = player.seasonStats.gp > 0 ? (player.seasonStats.reb / player.seasonStats.gp).toFixed(1) : '0.0';
  const apg = player.seasonStats.gp > 0 ? (player.seasonStats.ast / player.seasonStats.gp).toFixed(1) : '0.0';
  const fgPct = player.seasonStats.fga > 0 ? ((player.seasonStats.fgm / player.seasonStats.fga) * 100).toFixed(1) : '0.0';
  const fg3Pct = player.seasonStats.fg3a > 0 ? ((player.seasonStats.fg3m / player.seasonStats.fg3a) * 100).toFixed(1) : '0.0';
  
  const content = `
    <div class="player-card">
      <h2>${player.name}</h2>
      <div class="info-box">
        <strong>Team:</strong> ${teamName} | 
        <strong>Position:</strong> ${player.pos} | 
        <strong>Age:</strong> ${player.age}
      </div>
      
      <h3>Ratings</h3>
      <div class="ratings-grid">
        <div class="stat-item">
          <div class="stat-label">Overall</div>
          <div class="stat-value">${player.ratings.ovr}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Potential</div>
          <div class="stat-value">${player.ratings.pot}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Shooting</div>
          <div class="stat-value">${player.ratings.shoot}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Defense</div>
          <div class="stat-value">${player.ratings.defense}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Rebounding</div>
          <div class="stat-value">${player.ratings.rebound}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Passing</div>
          <div class="stat-value">${player.ratings.passing}</div>
        </div>
      </div>
      
      <h3>Contract</h3>
      <div class="info-box">
        <strong>Salary:</strong> $${player.contract.amount}M per year | 
        <strong>Expires:</strong> ${player.contract.exp}
      </div>
      
      <h3>Season Stats</h3>
      <div class="ratings-grid">
        <div class="stat-item">
          <div class="stat-label">Games</div>
          <div class="stat-value">${player.seasonStats.gp}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">PPG</div>
          <div class="stat-value">${ppg}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">RPG</div>
          <div class="stat-value">${rpg}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">APG</div>
          <div class="stat-value">${apg}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">FG%</div>
          <div class="stat-value">${fgPct}%</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">3P%</div>
          <div class="stat-value">${fg3Pct}%</div>
        </div>
      </div>
    </div>
  `;
  
  document.getElementById('modalContent').innerHTML = content;
  document.getElementById('playerModal').classList.add('active');
}

function closeModal(event) {
  if (event && event.target.id !== 'playerModal') return;
  document.getElementById('playerModal').classList.remove('active');
}

/* ============================
   INITIALIZATION
============================ */

(async function boot() {
  const saved = await loadMostRecentLeague();
  if (saved) {
    league = saved;
    nextPlayerId = Math.max(...league.teams.flatMap(t => t.players.map(p => p.id)), 
                            ...league.freeAgents.map(p => p.id)) + 1;
    selectedTeamId = league.teams[0].id;
    appView = 'league';
  }
  render();
})();

</script>
