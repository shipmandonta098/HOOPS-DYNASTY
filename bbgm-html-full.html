            function openTeamEditor() {
                setCustomTeams(initializeDefaultTeams());
                setEditingTeamIndex(0);
                setCurrentView('edit-teams');
            }

            function addNewTeam() {
                const newTeam = {
                    name: 'New Team',
                    city: 'New City',
                    abbrev: 'NEW',
                    conference: 'East',
                    division: 'Atlantic',
                    capacity: 18000,
                    primaryColor: '#000000',
                    secondaryColor: '#FFFFFF',
                    logoUrl: '',
                    secondaryLogoUrl: ''
                };
                setCustomTeams([...customTeams, newTeam]);
                setEditingTeamIndex(customTeams.length);
            }

            function removeTeam(index) {
                if (confirm('Are you sure you want to remove this team?')) {
                    const updated = customTeams.filter((_, i) => i !== index);
                    setCustomTeams(updated);
                    if (editingTeamIndex >= updated.length && updated.length > 0) {
                        setEditingTeamIndex(updated.length - 1);
                    } else if (updated.length === 0) {
                        setEditingTeamIndex(0);
                    }
                }
            }

            function updateTeamField(field, value) {
                const updated = [...customTeams];
                updated[editingTeamIndex][field] = value;
                setCustomTeams(updated);
            }

            function saveCustomTeams() {
                if (customTeams.length === 0) {
                    alert('You must have at least one team!');
                    return;
                }
                // Validate all teams have required fields
                for (let team of customTeams) {
                    if (!team.name || !team.city || !team.abbrev) {
                        alert('All teams must have a name, city, and abbreviation!');
                        return;
                    }
                }
                setCurrentView('team-select');
            }

            function cancelTeamEditing() {
                if (confirm('Discard changes?')) {
                    setCustomTeams([]);
                    setCurrentView('team-select');
                }
            }

            async function startNewLeague() {
                setCurrentView('team-select');
            }

            async function selectTeam(teamName) {
                setCurrentTeam(teamName);
                setCurrentView('league-settings');
            }

            async function createLeagueWithSettings() {
                setLoading(true);
                setCurrentView('game');
                await createNewGame();
                setLoading(false);
            }

            async function continueLeague() {
                setLoading(true);
                setCurrentView('game');
                await loadExistingGame();
                setLoading(false);
            }

            async function loadExistingGame() {
                try {
                    const existingState = await db.gameState.get(1);
                    
                    if (existingState) {
                        setCurrentSeason(existingState.currentSeason);
                        setCurrentTeam(existingState.currentTeam);
                        setSeasonPhase(existingState.seasonPhase);
                        setStandings(existingState.standings || {});
                        setChampionships(existingState.championships || {});
                        setDifficulty(existingState.difficulty || 'normal');
                        setSalaryCapEnabled(existingState.salaryCapEnabled !== false);
                        
                        // Load all league settings
                        setRegularSeasonGames(existingState.regularSeasonGames || 82);
                        setPlayoffTeams(existingState.playoffTeams || 16);
                        setPlayoffSeriesLength(existingState.playoffSeriesLength || 7);
                        setPlayerProgressionSpeed(existingState.playerProgressionSpeed || 'Normal');
                        setInjuryFrequency(existingState.injuryFrequency || 'Normal');
                        setRetirementAgeVariance(existingState.retirementAgeVariance || 'Normal 35-40');
                        setDraftRounds(existingState.draftRounds || 2);
                        setDraftLotteryOdds(existingState.draftLotteryOdds || 'Weighted by record');

                        setRevenueDifficulty(existingState.revenueDifficulty || 'Normal');

                        const players = await db.players
                            .where(['team', 'season'])
                            .equals([existingState.currentTeam, existingState.currentSeason])

                }
            }

            async function initializeGame() {
                try {
                    // Check if game exists
                    const existingState = await db.gameState.get(1);
                    
                    if (existingState) {
                        // Load existing game
                        setCurrentSeason(existingState.currentSeason);
                        setCurrentTeam(existingState.currentTeam);
                        setSeasonPhase(existingState.seasonPhase);
                        setStandings(existingState.standings || {});
                        setChampionships(existingState.championships || {});
                        
                        const teamData = await db.teams.where('season').equals(existingState.currentSeason).toArray();
                        const teamsObj = {};
                        teamData.forEach(t => teamsObj[t.name] = t);
                        setTeams(teamsObj);
                        setAllTeamNames(Object.keys(teamsObj));
                        
                        const players = await db.players
                            .where(['team', 'season'])
                            .equals([existingState.currentTeam, existingState.currentSeason])
                            .toArray();
                        setMyPlayers(players);
                    } else {
                        // Create new game
                        await createNewGame();
                    }
                    setLoading(false);
                } catch (error) {
                    console.error('Error initializing:', error);
                    setLoading(false);
                }
            }

            async function createNewGame() {
                const teamNames = customTeams.length > 0 
                    ? customTeams.map(t => `${t.city} ${t.name}`)
                    : [
                        'Seattle Storm', 'Las Vegas Vipers', 'Portland Thunder', 'Chicago Predators', 'Boston Knights', 'New York Titans',
                        'Los Angeles Phantoms', 'Miami Dragons', 'Atlanta Firebirds', 'Philadelphia Fusion', 'Phoenix Blaze', 'Dallas Outlaws',
                        'Denver Peaks', 'San Diego Waves', 'Houston Comets', 'San Antonio Strikers', 'Orlando Wizards', 'Detroit Motors',
                        'Charlotte Cobras', 'Memphis Blues', 'Minnesota Frost', 'Sacramento Royals', 'New Orleans Krewe', 'Milwaukee Titans',
                        'Indianapolis Racers', 'Cleveland Thunder', 'Pittsburgh Steel', 'Nashville Stars', 'Baltimore Blaze', 'San Francisco Sentinels'
                    ];

                const teamsData = teamNames.map((name, idx) => ({
                    name,
                    season: 2025,
                    wins: 0,
                    losses: 0,
                    budget: SALARY_CAP,
                    // Store custom team data
                    ...(customTeams.length > 0 ? {
                        city: customTeams[idx].city,
                        teamName: customTeams[idx].name,
                        abbrev: customTeams[idx].abbrev,
                        conference: customTeams[idx].conference,
                        division: customTeams[idx].division,
                        capacity: customTeams[idx].capacity,
                        primaryColor: customTeams[idx].primaryColor,
                        secondaryColor: customTeams[idx].secondaryColor,
                        logoUrl: customTeams[idx].logoUrl,
                        secondaryLogoUrl: customTeams[idx].secondaryLogoUrl
                    } : {})
                }));

                await db.teams.bulkAdd(teamsData);
                
                const teamsObj = {};
                teamsData.forEach(t => teamsObj[t.name] = t);
                setTeams(teamsObj);
                setAllTeamNames(teamNames);

                // Generate all players for all teams
                const allPlayers = [];
                const positions = ['PG', 'SG', 'SF', 'PF', 'C'];
                const firstNames = ['James', 'Kevin', 'Stephen', 'LeBron', 'Anthony', 'Chris', 'Michael', 'Kobe', 'Dwyane', 'Russell', 'Damian', 'Jayson', 'Luka', 'Giannis', 'Joel', 'Nikola', 'Kawhi', 'Paul', 'Jimmy', 'Devin', 'Trae', 'Zion', 'Ja', 'Donovan', 'Bradley'];
                const lastNames = ['Johnson', 'Williams', 'Brown', 'Davis', 'Miller', 'Wilson', 'Moore', 'Taylor', 'Anderson', 'Thomas', 'Jackson', 'White', 'Harris', 'Martin', 'Thompson', 'Garcia', 'Martinez', 'Robinson', 'Clark', 'Rodriguez', 'Lewis', 'Lee', 'Walker', 'Hall', 'Allen'];

                teamNames.forEach(teamName => {
                    for (let i = 0; i < 12; i++) {
                        const age = 19 + Math.floor(Math.random() * 15);
                        const potential = 50 + Math.floor(Math.random() * 50);
                        const baseRating = Math.max(40, Math.min(95, potential - (age - 22) * 2 + (Math.random() * 20 - 10)));
                        
                        allPlayers.push({
                            name: `${firstNames[Math.floor(Math.random() * firstNames.length)]} ${lastNames[Math.floor(Math.random() * lastNames.length)]}`,
                            team: teamName,
                            season: 2025,
                            position: positions[Math.floor(Math.random() * positions.length)],
                            age: age,
                            rating: Math.round(baseRating),
                            potential: potential,
                            contractYears: 1 + Math.floor(Math.random() * 4),
                            salary: Math.round((baseRating / 100) * 40000000 + Math.random() * 5000000),
                            ppg: 0,
                            rpg: 0,
                            apg: 0
                        });
                    }
                });

                await db.players.bulkAdd(allPlayers);

                const myTeamPlayers = allPlayers.filter(p => p.team === currentTeam);
                setMyPlayers(myTeamPlayers);

                await db.gameState.add({
                    id: 1,
                    currentSeason: 2025,
                    currentTeam: currentTeam,
                    seasonPhase: 'preseason',
                    standings: {},
                    championships: {},
                    difficulty: difficulty,
                    salaryCapEnabled: salaryCapEnabled,
                    // League settings
                    regularSeasonGames,
                    playoffTeams,
                    playoffSeriesLength,
                    playerProgressionSpeed,
                    injuryFrequency,
                    retirementAgeVariance,
                    draftRounds,
                    draftLotteryOdds,
                    rookieClassQuality,
                    startingBudget,
                    revenueDifficulty,
                    luxuryTaxEnabled,
                    customSalaryCap,
                    customLuxuryTax,
                    autoSaveFrequency,
                    simulationSpeed,
                    historicalStatTracking,
                    numDivisions,
                    numConferences,
                    conferencesEnabled,
                    playoffSeeding,
                    playerNameGeneration,
                    playerMoraleEnabled,
                    coachRatingsEnabled,
                    teamChemistryEnabled
                });
            }

            async function simulateSeason() {
                setLoading(true);
                try {
                    const newStandings = {};
                    
                    // Calculate standings for each team
                    for (const teamName of allTeamNames) {
                        const teamPlayers = await db.players
                            .where(['team', 'season'])
                            .equals([teamName, currentSeason])
                            .toArray();
                        
                        const teamRating = teamPlayers.reduce((sum, p) => sum + p.rating, 0) / teamPlayers.length;
                        const expectedWins = Math.round((teamRating - 50) / 2 + 41);
                        const wins = Math.max(10, Math.min(72, expectedWins + Math.floor(Math.random() * 20 - 10)));
                        
                        newStandings[teamName] = {
                            wins,
                            losses: 82 - wins
                        };
                    }

                    // Update player stats and development
                    const allPlayers = await db.players.where('season').equals(currentSeason).toArray();
                    const updatedPlayers = allPlayers.map(p => {
                        const ageFactor = p.age < 27 ? 1 : (p.age > 30 ? -1 : 0);
                        const potentialDiff = p.potential - p.rating;
                        const development = Math.random() * 3 * (potentialDiff > 0 ? 1 : -0.5) + ageFactor;
                        
                        return {
                            ...p,
                            rating: Math.max(40, Math.min(99, Math.round(p.rating + development))),
                            ppg: Math.round((p.rating / 5) * (Math.random() * 0.4 + 0.8) * 10) / 10,
                            rpg: Math.round((p.rating / 10) * (Math.random() * 0.5 + 0.8) * 10) / 10,
                            apg: Math.round((p.rating / 15) * (Math.random() * 0.6 + 0.7) * 10) / 10
                        };
                    });

                    await db.players.bulkPut(updatedPlayers);

                    setStandings(newStandings);
                    setSeasonPhase('playoffs');

                    await db.gameState.update(1, {
                        seasonPhase: 'playoffs',
                        standings: newStandings
                    });

                    const updatedMyPlayers = await db.players
                        .where(['team', 'season'])
                        .equals([currentTeam, currentSeason])
                        .toArray();
                    setMyPlayers(updatedMyPlayers);

                } catch (error) {
                    console.error('Error simulating season:', error);
                }
                setLoading(false);
            }

            async function simulatePlayoffs() {
                setLoading(true);
                try {
                    const sortedTeams = Object.entries(standings).sort((a, b) => b[1].wins - a[1].wins);
                    const champion = sortedTeams[Math.floor(Math.random() * 4)][0];
                    
                    const newChampionships = { ...championships };
                    newChampionships[champion] = (newChampionships[champion] || 0) + 1;
                    
                    setChampionships(newChampionships);
                    setSeasonPhase('offseason');

                    await db.gameState.update(1, {
                        seasonPhase: 'offseason',
                        championships: newChampionships
                    });

                    // Save season to history
                    await db.seasons.add({
                        year: currentSeason,
                        champion,
                        standings: JSON.stringify(standings)
                    });

                } catch (error) {
                    console.error('Error simulating playoffs:', error);
                }
                setLoading(false);
            }

            async function advanceToNextSeason() {
                setLoading(true);
                try {
                    const nextSeason = currentSeason + 1;
                    
                    // Age players and update contracts
                    const allPlayers = await db.players.where('season').equals(currentSeason).toArray();
                    const updatedPlayers = allPlayers
                        .map(p => ({
                            ...p,
                            age: p.age + 1,
                            contractYears: Math.max(0, p.contractYears - 1),
                            season: nextSeason
                        }))
                        .filter(p => p.contractYears > 0 || Math.random() > 0.3);

                    // Generate rookie draft class
                    const rookies = [];
                    const positions = ['PG', 'SG', 'SF', 'PF', 'C'];
                    const firstNames = ['Marcus', 'Brandon', 'Tyler', 'Jordan', 'Cameron', 'Dylan', 'Austin', 'Jason', 'Ryan', 'Alex', 'Evan', 'Noah', 'Mason', 'Logan', 'Lucas'];
                    const lastNames = ['Smith', 'Jones', 'Lee', 'Walker', 'Hall', 'Allen', 'Young', 'King', 'Wright', 'Lopez', 'Hill', 'Scott', 'Green', 'Adams', 'Baker'];
                    
                    // Draft rookies to teams based on previous season standings
                    const sortedTeams = Object.entries(standings).sort((a, b) => a[1].wins - b[1].wins);
                    
                    for (let i = 0; i < 30; i++) {
                        const draftingTeam = sortedTeams[i % sortedTeams.length][0];
                        const potential = Math.max(50, 95 - i * 0.8 + (Math.random() * 15 - 7.5));
                        const rating = Math.max(40, Math.round(potential - 20 + (Math.random() * 10 - 5)));
                        
                        rookies.push({
                            name: `${firstNames[Math.floor(Math.random() * firstNames.length)]} ${lastNames[Math.floor(Math.random() * lastNames.length)]}`,
                            team: draftingTeam,
                            season: nextSeason,
                            position: positions[Math.floor(Math.random() * positions.length)],
                            age: 19,
                            rating: rating,
                            potential: Math.round(potential),
                            contractYears: 4,
                            salary: Math.round((31 - i) * 300000),
                            ppg: 0,
                            rpg: 0,
                            apg: 0
                        });
                    }

                    // Clear old season players and add new ones
                    await db.players.where('season').equals(currentSeason).delete();
                    await db.players.bulkAdd([...updatedPlayers, ...rookies]);

                    // Create new teams for new season
                    const newTeamsData = allTeamNames.map(name => ({
                        name,
                        season: nextSeason,
                        wins: 0,
                        losses: 0,
                        budget: SALARY_CAP
                    }));
                    await db.teams.bulkAdd(newTeamsData);

                    setCurrentSeason(nextSeason);
                    setSeasonPhase('preseason');
                    setStandings({});

                    await db.gameState.update(1, {
                        currentSeason: nextSeason,
                        seasonPhase: 'preseason',
                        standings: {}
                    });

                    const newMyPlayers = await db.players
                        .where(['team', 'season'])
                        .equals([currentTeam, nextSeason])
                        .toArray();
                    setMyPlayers(newMyPlayers);

                } catch (error) {
                    console.error('Error advancing season:', error);
                }
                setLoading(false);
            }
