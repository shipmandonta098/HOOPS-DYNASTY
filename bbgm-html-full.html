<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball GM Simulator</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // IndexedDB Setup with Dexie - Fresh start
        const db = new Dexie('BasketballGM');
        
        // Version 1: Original schema
        db.version(1).stores({
            leagues: '++id, name, createdDate, lastPlayed',
            players: '++id, leagueId, [leagueId+team+season], team, season, age, rating',
            teams: '++id, [leagueId+season], [leagueId+name+season], leagueId, name, season, conference, division',
            seasons: '++id, [leagueId+year], leagueId, year',
            gameState: '++id, leagueId'
        });
        
        // Version 2: Added schedule table
        db.version(2).stores({
            leagues: '++id, name, createdDate, lastPlayed',
            players: '++id, leagueId, [leagueId+team+season], team, season, age, rating',
            teams: '++id, [leagueId+season], [leagueId+name+season], leagueId, name, season, conference, division',
            seasons: '++id, [leagueId+year], leagueId, year',
            gameState: '++id, leagueId',
            schedule: '++id, [leagueId+season], leagueId, season, day, homeTeam, awayTeam, result, homeScore, awayScore, overtime, time',
            draftProspects: '++id, [leagueId+season], leagueId, season, drafted, projectedPick'
        }).upgrade(tx => {
            console.log('✅ Database upgraded to version 2: Added schedule and draftProspects tables');
            console.log('⚠️ Please refresh the page if you encounter any errors');
            return Promise.resolve();
        });

        const SALARY_CAP = 140000000;
        const LUXURY_TAX = 165000000;

        const BasketballGM = () => {
            const [loading, setLoading] = useState(true);
            const [currentSeason, setCurrentSeason] = useState(2025);
            const [currentTeam, setCurrentTeam] = useState('Seattle Storm');
            const [seasonPhase, setSeasonPhase] = useState('preseason');
            const [teams, setTeams] = useState({});
            const [standings, setStandings] = useState({});
            const [myPlayers, setMyPlayers] = useState([]);
            const [allTeamNames, setAllTeamNames] = useState([]);
            const [championships, setChampionships] = useState({});
            
            // League management state
            const [currentLeagueId, setCurrentLeagueId] = useState(null);
            const [allLeagues, setAllLeagues] = useState([]);
            const [newLeagueName, setNewLeagueName] = useState('');
            
            // New state for home screen and navigation
            const [currentView, setCurrentView] = useState('home'); // home, league-select, team-select, league-settings, game, edit-teams
            const [currentPage, setCurrentPage] = useState('dashboard'); // dashboard, roster, standings, finances, etc.
            const [leagueExists, setLeagueExists] = useState(false);
            const [difficulty, setDifficulty] = useState('normal');
            const [salaryCapEnabled, setSalaryCapEnabled] = useState(true);
            
            // Team customization state
            const [customTeams, setCustomTeams] = useState([]);
            const [editingTeamIndex, setEditingTeamIndex] = useState(0);
            
            // League settings state
            const [regularSeasonGames, setRegularSeasonGames] = useState(82);
            const [playoffTeams, setPlayoffTeams] = useState(16);
            const [playoffSeriesLength, setPlayoffSeriesLength] = useState(7);
            const [playerProgressionSpeed, setPlayerProgressionSpeed] = useState('Normal');
            const [injuryFrequency, setInjuryFrequency] = useState('Normal');
            const [retirementAgeVariance, setRetirementAgeVariance] = useState('Normal 35-40');
            const [draftRounds, setDraftRounds] = useState(2);
            const [draftLotteryOdds, setDraftLotteryOdds] = useState('Weighted by record');
            const [rookieClassQuality, setRookieClassQuality] = useState('Average');
            const [startingBudget, setStartingBudget] = useState(50000000);
            const [revenueDifficulty, setRevenueDifficulty] = useState('Normal');
            const [luxuryTaxEnabled, setLuxuryTaxEnabled] = useState(true);
            const [customSalaryCap, setCustomSalaryCap] = useState(140000000);
            const [customLuxuryTax, setCustomLuxuryTax] = useState(165000000);
            const [autoSaveFrequency, setAutoSaveFrequency] = useState('Every season');
            const [simulationSpeed, setSimulationSpeed] = useState('Instant');
            const [historicalStatTracking, setHistoricalStatTracking] = useState('Standard');
            const [numDivisions, setNumDivisions] = useState(6);
            const [numConferences, setNumConferences] = useState(2);
            const [conferencesEnabled, setConferencesEnabled] = useState(true);
            const [playoffSeeding, setPlayoffSeeding] = useState('Division winners prioritized');
            const [playerNameGeneration, setPlayerNameGeneration] = useState('Generated');
            const [playerMoraleEnabled, setPlayerMoraleEnabled] = useState(false);
            const [coachRatingsEnabled, setCoachRatingsEnabled] = useState(false);
            const [teamChemistryEnabled, setTeamChemistryEnabled] = useState(false);
            const [rosterSize, setRosterSize] = useState(15);
            const [selectedPlayer, setSelectedPlayer] = useState(null);

            // Draft state
            const [draftProspects, setDraftProspects] = useState([]);
            const [draftTab, setDraftTab] = useState('prospects'); // prospects, bigboard, simulator, live
            const [draftInProgress, setDraftInProgress] = useState(false);
            const [currentDraftPick, setCurrentDraftPick] = useState(1);
            const [draftOrder, setDraftOrder] = useState([]);
            const [scoutedPlayers, setScoutedPlayers] = useState(new Set());
            const [scoutingBudget, setScoutingBudget] = useState(20); // Can fully scout 20 players
            const [bigBoard, setBigBoard] = useState([]); // User's personal rankings
            const [selectedProspect, setSelectedProspect] = useState(null);
            const [draftResults, setDraftResults] = useState([]);

            useEffect(() => {
                checkForExistingLeague();
            }, []);

            useEffect(() => {
                loadAllLeagues();
            }, []);

            // Load schedule when page changes to schedule
            useEffect(() => {
                if (currentPage === 'schedule' && currentLeagueId && currentSeason) {
                    loadScheduleGames();
                }
            }, [currentPage, currentLeagueId, currentSeason, scheduleTab]);
            
            // Load draft prospects when page changes to draft
            useEffect(() => {
                if (currentPage === 'draft' && currentLeagueId && currentSeason) {
                    loadDraftProspects();
                    if (draftOrder.length === 0) {
                        calculateDraftOrder();
                    }
                }
            }, [currentPage, currentLeagueId, currentSeason]);

            async function loadScheduleGames() {
                try {
                    const allGames = await db.schedule
                        .where('[leagueId+season]')
                        .equals([currentLeagueId, currentSeason])
                        .toArray();
                    
                    setScheduleGames(allGames);
                } catch (error) {
                    console.error('Error loading schedule:', error);
                    setScheduleGames([]);
                }
            }

            async function loadAllLeagues() {
                try {
                    const leagues = await db.leagues.toArray();
                    setAllLeagues(leagues);
                    setLeagueExists(leagues.length > 0);
                    setLoading(false);
                } catch (error) {
                    console.error('Error loading leagues:', error);
                    setLoading(false);
                }
            }

            async function createNewLeaguePrompt() {
                const leagueCount = allLeagues.length + 1;
                setNewLeagueName(`League ${leagueCount}`);
                setCurrentView('team-select');
            }

            async function selectLeague(leagueId) {
                setLoading(true);
                setCurrentLeagueId(leagueId);
                await loadExistingGame(leagueId);
                setCurrentView('game');
                setLoading(false);
            }

            async function renameLeague(leagueId, currentName) {
                const newName = prompt('Enter new league name:', currentName);
                if (newName && newName.trim()) {
                    await db.leagues.update(leagueId, { name: newName.trim() });
                    await loadAllLeagues();
                }
            }

            async function deleteLeague(leagueId, leagueName) {
                if (confirm(`Are you sure you want to delete "${leagueName}"? This cannot be undone.`)) {
                    try {
                        await db.leagues.delete(leagueId);
                        await db.players.where('leagueId').equals(leagueId).delete();
                        await db.teams.where('leagueId').equals(leagueId).delete();
                        await db.seasons.where('leagueId').equals(leagueId).delete();
                        await db.gameState.where('leagueId').equals(leagueId).delete();
                        await loadAllLeagues();
                        alert('League deleted successfully!');
                    } catch (error) {
                        console.error('Error deleting league:', error);
                        alert('Error deleting league.');
                    }
                }
            }

            async function checkForExistingLeague() {
                try {
                    const existingState = await db.gameState.get(1);
                    setLeagueExists(!!existingState);
                    setLoading(false);
                } catch (error) {
                    console.error('Error checking for league:', error);
                    setLoading(false);
                }
            }

            function generatePlayerArchetype(skills, position) {
                const archetypes = {
                    'PG': ['Floor General', 'Scoring Guard', 'Playmaker', 'Two-Way Guard'],
                    'SG': ['Sharpshooter', 'Slasher', 'Two-Way Wing', 'Scoring Guard'],
                    'SF': ['Three-and-D Wing', 'Slasher', 'Point Forward', 'Two-Way Wing'],
                    'PF': ['Stretch Four', 'Inside Scorer', 'Two-Way Forward', 'Glass Cleaner'],
                    'C': ['Rim Protector', 'Post Scorer', 'Stretch Five', 'Glass Cleaner']
                };
                
                const posArchetypes = archetypes[position] || archetypes['SF'];
                return posArchetypes[Math.floor(Math.random() * posArchetypes.length)];
            }

            function generatePlayerBadges(skills, position) {
                const badges = [];
                if (skills.threePoint >= 85) badges.push('Three-Point Specialist');
                if (skills.defense >= 85) badges.push('Defensive Anchor');
                if (skills.passing >= 85) badges.push('Floor General');
                if (skills.blocking >= 85) badges.push('Rim Protector');
                if (skills.rebounding >= 85) badges.push('Glass Cleaner');
                if (skills.clutch >= 85) badges.push('Clutch Performer');
                if (skills.insideScoring >= 85) badges.push('Inside Force');
                if (skills.ballHandling >= 85) badges.push('Playmaker');
                return badges;
            }

            function getCareerTrajectory(age, rating, potential) {
                if (age < 25 && potential > rating + 10) return 'Rising Star';
                if (age >= 25 && age <= 29) return 'Prime';
                if (age > 29 && rating >= 80) return 'Steady Veteran';
                if (age > 32) return 'Declining';
                return 'Steady';
            }

            function generateBirthdate(age) {
                const currentYear = 2025;
                const birthYear = currentYear - age;
                const month = Math.floor(Math.random() * 12);
                const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
                const daysInMonth = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
                const day = Math.floor(Math.random() * daysInMonth[month]) + 1;
                
                return {
                    month: monthNames[month],
                    day,
                    year: birthYear,
                    formatted: `${monthNames[month]} ${day}, ${birthYear}`
                };
            }

            function generateHometown() {
                const hometowns = [
                    'Los Angeles, California', 'Chicago, Illinois', 'Houston, Texas', 'Phoenix, Arizona',
                    'Philadelphia, Pennsylvania', 'San Antonio, Texas', 'San Diego, California', 'Dallas, Texas',
                    'San Jose, California', 'Austin, Texas', 'Jacksonville, Florida', 'Fort Worth, Texas',
                    'Columbus, Ohio', 'Charlotte, North Carolina', 'Indianapolis, Indiana', 'Seattle, Washington',
                    'Denver, Colorado', 'Boston, Massachusetts', 'Detroit, Michigan', 'Memphis, Tennessee',
                    'Portland, Oregon', 'Oklahoma City, Oklahoma', 'Las Vegas, Nevada', 'Louisville, Kentucky',
                    'Baltimore, Maryland', 'Milwaukee, Wisconsin', 'Albuquerque, New Mexico', 'Tucson, Arizona',
                    'Fresno, California', 'Sacramento, California', 'Atlanta, Georgia', 'Miami, Florida',
                    'Cleveland, Ohio', 'New Orleans, Louisiana', 'Oakland, California', 'Minneapolis, Minnesota',
                    'Brooklyn, New York', 'Tampa, Florida', 'Newark, New Jersey', 'Washington, D.C.',
                    'St. Louis, Missouri', 'Pittsburgh, Pennsylvania', 'Cincinnati, Ohio', 'Kansas City, Missouri',
                    'Raleigh, North Carolina', 'Omaha, Nebraska', 'Virginia Beach, Virginia'
                ];
                return hometowns[Math.floor(Math.random() * hometowns.length)];
            }

            function generateCollege(age) {
                const colleges = [
                    'Duke University', 'Kentucky', 'North Carolina', 'Kansas', 'UCLA', 'Gonzaga', 'Villanova',
                    'Michigan', 'Arizona', 'Syracuse', 'Louisville', 'Michigan State', 'Connecticut',
                    'Indiana', 'Florida', 'Texas', 'Memphis', 'Maryland', 'Ohio State', 'Wisconsin',
                    'Purdue', 'Illinois', 'Stanford', 'USC', 'Georgetown', 'Notre Dame', 'Virginia',
                    'Baylor', 'Oregon', 'Tennessee', 'Alabama', 'LSU', 'Wake Forest', 'Georgia Tech'
                ];
                
                const international = ['France', 'Spain', 'Serbia', 'Croatia', 'Australia', 'Canada', 'Lithuania', 'Greece', 'Germany', 'Argentina'];
                
                // Young players (19-20) might be international or high school
                if (age <= 20 && Math.random() < 0.2) {
                    return Math.random() < 0.5 ? 'High School' : international[Math.floor(Math.random() * international.length)];
                }
                
                // Some chance of international for any age
                if (Math.random() < 0.15) {
                    return international[Math.floor(Math.random() * international.length)];
                }
                
                return colleges[Math.floor(Math.random() * colleges.length)];
            }

            function generateDraftInfo(age, rating, teamNames) {
                const yearsInLeague = Math.max(0, age - 19);
                const draftYear = 2025 - yearsInLeague;
                
                // Higher rated players more likely to be drafted higher
                // Undrafted chance for lower rated players
                if (rating < 60 && Math.random() < 0.3) {
                    return {
                        year: draftYear,
                        round: null,
                        pick: null,
                        team: null,
                        undrafted: true,
                        formatted: 'Undrafted'
                    };
                }
                
                let round, pick;
                if (rating >= 80) {
                    // Elite players: lottery picks
                    round = 1;
                    pick = Math.floor(Math.random() * 14) + 1;
                } else if (rating >= 70) {
                    // Good players: first round
                    round = 1;
                    pick = Math.floor(Math.random() * 30) + 1;
                } else {
                    // Others: mostly second round
                    if (Math.random() < 0.3) {
                        round = 1;
                        pick = 15 + Math.floor(Math.random() * 15);
                    } else {
                        round = 2;
                        pick = Math.floor(Math.random() * 30) + 1;
                    }
                }
                
                const draftTeam = teamNames[Math.floor(Math.random() * teamNames.length)];
                
                return {
                    year: draftYear,
                    round,
                    pick,
                    team: draftTeam,
                    undrafted: false,
                    formatted: `Round ${round}, Pick ${pick}`
                };
            }

            function generatePhysicalAttributes(position) {
                const heights = {
                    'PG': [72, 76], // 6'0" - 6'4"
                    'SG': [74, 78], // 6'2" - 6'6"
                    'SF': [77, 81], // 6'5" - 6'9"
                    'PF': [80, 84], // 6'8" - 7'0"
                    'C': [82, 88]   // 6'10" - 7'4"
                };
                
                const range = heights[position] || heights['SF'];
                const heightInches = range[0] + Math.floor(Math.random() * (range[1] - range[0]));
                const weight = 160 + (heightInches - 72) * 5 + Math.floor(Math.random() * 40);
                const wingspan = heightInches + Math.floor(Math.random() * 8) - 2;
                
                return {
                    heightInches,
                    weight,
                    wingspan,
                    verticalLeap: 24 + Math.floor(Math.random() * 20)
                };
            }

            function openPlayerProfile(player) {
                setSelectedPlayer(player);
                setViewingPlayerProfile(true);
            }

            function closePlayerProfile() {
                setSelectedPlayer(null);
                setViewingPlayerProfile(false);
            }

            function navigateToNextPlayer() {
                const currentIndex = myPlayers.findIndex(p => p.id === selectedPlayer.id);
                if (currentIndex < myPlayers.length - 1) {
                    setSelectedPlayer(myPlayers[currentIndex + 1]);
                }
            }

            function navigateToPreviousPlayer() {
                const currentIndex = myPlayers.findIndex(p => p.id === selectedPlayer.id);
                if (currentIndex > 0) {
                    setSelectedPlayer(myPlayers[currentIndex - 1]);
                }
            }

            async function viewTeamRoster(teamName) {
                try {
                    setViewingTeam(teamName);
                    let players = await db.players
                        .where('[leagueId+team+season]')
                        .equals([currentLeagueId, teamName, currentSeason])
                        .toArray();
                    
                    // Fix any players with missing data
                    players = await Promise.all(players.map(p => loadAndFixPlayer(p)));
                    
                    setViewingTeamPlayers(players);
                } catch (error) {
                    console.error('Error loading team roster:', error);
                }
            }

            function closeTeamRoster() {
                setViewingTeam(null);
                setViewingTeamPlayers([]);
            }

            // Auto-fix missing data functions
            function assignDivisionAndConference(teamName) {
                // Map of default teams to their divisions
                const teamDivisionMap = {
                    // Atlantic Division (Eastern Conference)
                    'Boston Knights': { division: 'Atlantic', conference: 'Eastern' },
                    'New York Titans': { division: 'Atlantic', conference: 'Eastern' },
                    'Philadelphia Fusion': { division: 'Atlantic', conference: 'Eastern' },
                    'Baltimore Blaze': { division: 'Atlantic', conference: 'Eastern' },
                    'Charlotte Cobras': { division: 'Atlantic', conference: 'Eastern' },
                    
                    // Central Division (Eastern Conference)
                    'Chicago Predators': { division: 'Central', conference: 'Eastern' },
                    'Detroit Motors': { division: 'Central', conference: 'Eastern' },
                    'Indianapolis Racers': { division: 'Central', conference: 'Eastern' },
                    'Milwaukee Titans': { division: 'Central', conference: 'Eastern' },
                    'Cleveland Thunder': { division: 'Central', conference: 'Eastern' },
                    
                    // Southeast Division (Eastern Conference)
                    'Miami Dragons': { division: 'Southeast', conference: 'Eastern' },
                    'Atlanta Firebirds': { division: 'Southeast', conference: 'Eastern' },
                    'Orlando Wizards': { division: 'Southeast', conference: 'Eastern' },
                    'Nashville Stars': { division: 'Southeast', conference: 'Eastern' },
                    'Pittsburgh Steel': { division: 'Southeast', conference: 'Eastern' },
                    
                    // Pacific Division (Western Conference)
                    'Seattle Storm': { division: 'Pacific', conference: 'Western' },
                    'Las Vegas Vipers': { division: 'Pacific', conference: 'Western' },
                    'Portland Thunder': { division: 'Pacific', conference: 'Western' },
                    'Los Angeles Phantoms': { division: 'Pacific', conference: 'Western' },
                    'Sacramento Royals': { division: 'Pacific', conference: 'Western' },
                    
                    // Southwest Division (Western Conference)
                    'Phoenix Blaze': { division: 'Southwest', conference: 'Western' },
                    'Dallas Outlaws': { division: 'Southwest', conference: 'Western' },
                    'Houston Comets': { division: 'Southwest', conference: 'Western' },
                    'San Antonio Strikers': { division: 'Southwest', conference: 'Western' },
                    'New Orleans Krewe': { division: 'Southwest', conference: 'Western' },
                    
                    // Northwest Division (Western Conference)
                    'Denver Peaks': { division: 'Northwest', conference: 'Western' },
                    'San Diego Waves': { division: 'Northwest', conference: 'Western' },
                    'Memphis Blues': { division: 'Northwest', conference: 'Western' },
                    'Minnesota Frost': { division: 'Northwest', conference: 'Western' },
                    'San Francisco Sentinels': { division: 'Northwest', conference: 'Western' }
                };
                
                // Return mapped division if found
                if (teamDivisionMap[teamName]) {
                    return teamDivisionMap[teamName];
                }
                
                // Fallback: Use hash for custom teams
                const divisions = [
                    { division: "Atlantic", conference: "Eastern" },
                    { division: "Central", conference: "Eastern" },
                    { division: "Southeast", conference: "Eastern" },
                    { division: "Northwest", conference: "Western" },
                    { division: "Pacific", conference: "Western" },
                    { division: "Southwest", conference: "Western" }
                ];
                
                const hash = teamName.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
                return divisions[hash % divisions.length];
            }

            async function loadAndFixTeams(leagueId, season) {
                const teams = await db.teams.where('[leagueId+season]').equals([leagueId, season]).toArray();
                
                // Fix any teams missing division/conference
                const fixedTeams = [];
                for (const team of teams) {
                    if (!team.division || !team.conference) {
                        const assignment = assignDivisionAndConference(team.name);
                        team.division = assignment.division;
                        team.conference = assignment.conference;
                        
                        // Save the fix
                        await db.teams.update(team.id, {
                            division: team.division,
                            conference: team.conference
                        });
                    }
                    fixedTeams.push(team);
                }
                
                return fixedTeams;
            }

            async function loadAndFixPlayer(player) {
                let needsUpdate = false;
                const updates = {};
                
                // If missing bio data, generate and save
                if (!player.birthdate || !player.hometown || !player.college) {
                    if (!player.birthdate) {
                        const birthdate = generateBirthdate(player.age);
                        player.birthdate = birthdate.formatted;
                        player.birthdateMonth = birthdate.month;
                        player.birthdateDay = birthdate.day;
                        player.birthdateYear = birthdate.year;
                        updates.birthdate = birthdate.formatted;
                        updates.birthdateMonth = birthdate.month;
                        updates.birthdateDay = birthdate.day;
                        updates.birthdateYear = birthdate.year;
                        needsUpdate = true;
                    }
                    
                    if (!player.hometown) {
                        player.hometown = generateHometown();
                        updates.hometown = player.hometown;
                        needsUpdate = true;
                    }
                    
                    if (!player.college) {
                        player.college = generateCollege(player.age);
                        updates.college = player.college;
                        needsUpdate = true;
                    }
                    
                    if (!player.draftYear) {
                        const teamNames = allTeamNames.length > 0 ? allTeamNames : [player.team];
                        const draftInfo = generateDraftInfo(player.age, player.rating, teamNames);
                        player.draftYear = draftInfo.year;
                        player.draftRound = draftInfo.round;
                        player.draftPick = draftInfo.pick;
                        player.draftTeam = draftInfo.team;
                        player.undrafted = draftInfo.undrafted;
                        updates.draftYear = draftInfo.year;
                        updates.draftRound = draftInfo.round;
                        updates.draftPick = draftInfo.pick;
                        updates.draftTeam = draftInfo.team;
                        updates.undrafted = draftInfo.undrafted;
                        needsUpdate = true;
                    }
                }
                
                // Save the fixes
                if (needsUpdate && player.id) {
                    await db.players.update(player.id, updates);
                }
                
                return player;
            }

            // Division assignment function
            function assignDivisionsToTeams(teams) {
                const divisions = [
                    { name: "Atlantic", conference: "Eastern" },
                    { name: "Central", conference: "Eastern" },
                    { name: "Southeast", conference: "Eastern" },
                    { name: "Northwest", conference: "Western" },
                    { name: "Pacific", conference: "Western" },
                    { name: "Southwest", conference: "Western" }
                ];
                
                // Distribute teams evenly across divisions
                const teamsPerDivision = Math.ceil(teams.length / divisions.length);
                
                return teams.map((team, index) => {
                    const divisionIndex = Math.min(Math.floor(index / teamsPerDivision), divisions.length - 1);
                    const division = divisions[divisionIndex];
                    
                    return {
                        ...team,
                        division: division.name,
                        conference: division.conference
                    };
                });
            }

            // Standings calculation functions
            function calculateWinPercentage(wins, losses) {
                const total = wins + losses;
                return total === 0 ? 0 : (wins / total);
            }

            function calculateGamesBack(teamWins, teamLosses, leaderWins, leaderLosses) {
                const gb = ((leaderWins - teamWins) + (teamLosses - leaderLosses)) / 2;
                return gb === 0 ? '—' : gb.toFixed(1);
            }

            function calculateLast10(last10String) {
                if (!last10String || last10String.length === 0) return '0-0';
                const recent = last10String.slice(-10);
                const wins = (recent.match(/W/g) || []).length;
                const losses = (recent.match(/L/g) || []).length;
                return `${wins}-${losses}`;
            }

            function calculateStreak(last10String) {
                if (!last10String || last10String.length === 0) return '—';
                
                let streak = 1;
                const lastResult = last10String[last10String.length - 1];
                
                for (let i = last10String.length - 2; i >= 0; i--) {
                    if (last10String[i] === lastResult) {
                        streak++;
                    } else {
                        break;
                    }
                }
                
                return `${lastResult}${streak}`;
            }

            function getStandingsData() {
                // If standings is empty, initialize with all teams at 0-0
                if (Object.keys(standings).length === 0 && allTeamNames.length > 0) {
                    return allTeamNames.map(teamName => {
                        const team = teams[teamName] || {};
                        return {
                            team: teamName,
                            wins: 0,
                            losses: 0,
                            conference: team.conference || 'East',
                            division: team.division || 'Atlantic',
                            confWins: 0,
                            confLosses: 0,
                            homeWins: 0,
                            homeLosses: 0,
                            awayWins: 0,
                            awayLosses: 0,
                            last10: '',
                            winPct: 0
                        };
                    });
                }
                
                // Convert standings object to array with all calculated fields
                const standingsArray = Object.entries(standings).map(([teamName, teamData]) => {
                    const team = teams[teamName] || {};
                    return {
                        team: teamName,
                        wins: teamData.wins || 0,
                        losses: teamData.losses || 0,
                        conference: team.conference || 'East',
                        division: team.division || 'Atlantic',
                        confWins: teamData.confWins || 0,
                        confLosses: teamData.confLosses || 0,
                        homeWins: teamData.homeWins || 0,
                        homeLosses: teamData.homeLosses || 0,
                        awayWins: teamData.awayWins || 0,
                        awayLosses: teamData.awayLosses || 0,
                        last10: teamData.last10 || '',
                        winPct: calculateWinPercentage(teamData.wins || 0, teamData.losses || 0)
                    };
                });

                // Sort by win percentage
                standingsArray.sort((a, b) => b.winPct - a.winPct);

                return standingsArray;
            }

            async function simulateSeason() {
                setLoading(true);
                try {
                    // Check if schedule exists
                    const scheduleGames = await db.schedule
                        .where('[leagueId+season]')
                        .equals([currentLeagueId, currentSeason])
                        .toArray();
                    
                    const newStandings = {};
                    
                    // Initialize standings for each team
                    for (const teamName of allTeamNames) {
                        const teamData = teams[teamName] || {};
                        newStandings[teamName] = {
                            wins: 0,
                            losses: 0,
                            confWins: 0,
                            confLosses: 0,
                            homeWins: 0,
                            homeLosses: 0,
                            awayWins: 0,
                            awayLosses: 0,
                            last10: '',
                            conference: teamData.conference || 'Eastern',
                            division: teamData.division || 'Atlantic'
                        };
                    }

                    // Simulate games from schedule (day-based system)
                    if (scheduleGames.length > 0) {
                        // Get team ratings for all teams
                        const teamRatings = {};
                        for (const teamName of allTeamNames) {
                            const teamPlayers = await db.players
                                .where('[leagueId+team+season]')
                                .equals([currentLeagueId, teamName, currentSeason])
                                .toArray();
                            teamRatings[teamName] = teamPlayers.reduce((sum, p) => sum + p.rating, 0) / teamPlayers.length;
                        }
                        
                        // Track game results for last 10
                        const teamGameResults = {};
                        allTeamNames.forEach(team => teamGameResults[team] = []);
                        
                        // Simulate each scheduled game
                        for (const game of scheduleGames) {
                            const homeTeam = game.homeTeam;
                            const awayTeam = game.awayTeam;
                            
                            const homeRating = teamRatings[homeTeam] || 70;
                            const awayRating = teamRatings[awayTeam] || 70;
                            
                            const homeData = teams[homeTeam] || {};
                            const awayData = teams[awayTeam] || {};
                            const homeConf = homeData.conference || 'Eastern';
                            const awayConf = awayData.conference || 'Eastern';
                            const isConfGame = homeConf === awayConf;
                            
                            // Calculate scores with home court advantage
                            const homeAdvantage = 3;
                            const ratingDiff = homeRating - awayRating + homeAdvantage;
                            const homeWinProb = 0.5 + (ratingDiff / 100);
                            const homeWins = Math.random() < homeWinProb;
                            
                            // Generate realistic scores
                            const homeScore = Math.round(100 + (homeRating - 65) * 1.5 + homeAdvantage + (Math.random() * 20 - 10));
                            const awayScore = Math.round(100 + (awayRating - 65) * 1.5 + (Math.random() * 20 - 10));
                            
                            // Ensure winner has higher score
                            const finalHomeScore = homeWins ? Math.max(homeScore, awayScore + 1) : Math.min(homeScore, awayScore - 1);
                            const finalAwayScore = homeWins ? Math.min(awayScore, finalHomeScore - 1) : Math.max(awayScore, finalHomeScore + 1);
                            
                            // Determine overtime
                            const overtime = Math.abs(finalHomeScore - finalAwayScore) <= 3 && Math.random() < 0.15;
                            
                            // Update schedule with results
                            await db.schedule.update(game.id, {
                                result: 'final',
                                homeScore: finalHomeScore,
                                awayScore: finalAwayScore,
                                overtime
                            });
                            
                            // Update standings
                            if (homeWins) {
                                newStandings[homeTeam].wins++;
                                newStandings[homeTeam].homeWins++;
                                newStandings[awayTeam].losses++;
                                newStandings[awayTeam].awayLosses++;
                                if (isConfGame) {
                                    newStandings[homeTeam].confWins++;
                                    newStandings[awayTeam].confLosses++;
                                }
                                teamGameResults[homeTeam].push('W');
                                teamGameResults[awayTeam].push('L');
                            } else {
                                newStandings[awayTeam].wins++;
                                newStandings[awayTeam].awayWins++;
                                newStandings[homeTeam].losses++;
                                newStandings[homeTeam].homeLosses++;
                                if (isConfGame) {
                                    newStandings[awayTeam].confWins++;
                                    newStandings[homeTeam].confLosses++;
                                }
                                teamGameResults[awayTeam].push('W');
                                teamGameResults[homeTeam].push('L');
                            }
                        }
                        
                        // Set last 10 for each team
                        allTeamNames.forEach(team => {
                            newStandings[team].last10 = teamGameResults[team].join('');
                        });
                    } else {
                        // Fallback: Old simulation method if no schedule exists
                        console.warn('No schedule found, using random simulation');
                        const gamesPerTeam = regularSeasonGames;
                        const homeGames = gamesPerTeam / 2;
                        
                        for (const teamName of allTeamNames) {
                            const teamPlayers = await db.players
                                .where('[leagueId+team+season]')
                                .equals([currentLeagueId, teamName, currentSeason])
                                .toArray();
                            
                            const teamRating = teamPlayers.reduce((sum, p) => sum + p.rating, 0) / teamPlayers.length;
                            const teamData = teams[teamName] || {};
                            const teamConf = teamData.conference || 'Eastern';
                            
                            let totalWins = 0;
                            let homeWins = 0;
                            let awayWins = 0;
                            let confWins = 0;
                            let gameResults = [];
                            
                            for (let game = 0; game < gamesPerTeam; game++) {
                                const isHome = game < homeGames;
                                const homeAdvantage = isHome ? 3 : -3;
                                
                                const opponents = allTeamNames.filter(t => t !== teamName);
                                const opponentName = opponents[Math.floor(Math.random() * opponents.length)];
                                const opponentData = teams[opponentName] || {};
                                const opponentConf = opponentData.conference || 'Western';
                                const isConfGame = teamConf === opponentConf;
                                
                                const opponentPlayers = await db.players
                                    .where('[leagueId+team+season]')
                                    .equals([currentLeagueId, opponentName, currentSeason])
                                    .toArray();
                                const opponentRating = opponentPlayers.reduce((sum, p) => sum + p.rating, 0) / opponentPlayers.length;
                                
                                const ratingDiff = teamRating - opponentRating + homeAdvantage;
                                const winProb = 0.5 + (ratingDiff / 100);
                                const won = Math.random() < winProb;
                                
                                if (won) {
                                    totalWins++;
                                    if (isHome) homeWins++;
                                    else awayWins++;
                                    if (isConfGame) confWins++;
                                    gameResults.push('W');
                                } else {
                                    if (isConfGame) {
                                        newStandings[teamName].confLosses = (newStandings[teamName].confLosses || 0) + 1;
                                    }
                                    gameResults.push('L');
                                }
                            }
                            
                            const totalLosses = gamesPerTeam - totalWins;
                            newStandings[teamName].wins = totalWins;
                            newStandings[teamName].losses = totalLosses;
                            newStandings[teamName].homeWins = homeWins;
                            newStandings[teamName].homeLosses = homeGames - homeWins;
                            newStandings[teamName].awayWins = awayWins;
                            newStandings[teamName].awayLosses = (gamesPerTeam - homeGames) - awayWins;
                            newStandings[teamName].confWins = confWins;
                            newStandings[teamName].last10 = gameResults.join('');
                        }
                    }

                    // Update player stats and development
                    let allPlayers = await db.players.where('[leagueId+season]').equals([currentLeagueId, currentSeason]).toArray();
                    
                    // Fix any players with missing bio data
                    allPlayers = await Promise.all(allPlayers.map(p => loadAndFixPlayer(p)));
                    
                    const updatedPlayers = allPlayers.map(p => {
                        const ageFactor = p.age < 27 ? 1 : (p.age > 30 ? -1 : 0);
                        const potentialDiff = p.potential - p.rating;
                        const development = Math.random() * 3 * (potentialDiff > 0 ? 1 : -0.5) + ageFactor;
                        
                        return {
                            ...p,
                            rating: Math.max(40, Math.min(99, Math.round(p.rating + development))),
                            ppg: Math.round((p.rating / 5) * (Math.random() * 0.4 + 0.8) * 10) / 10,
                            rpg: Math.round((p.rating / 10) * (Math.random() * 0.5 + 0.8) * 10) / 10,
            apg: Math.round((p.rating / 15) * (Math.random() * 0.6 + 0.7) * 10) / 10
                        };
                    });

                    await db.players.bulkPut(updatedPlayers);

                    setStandings(newStandings);
                    setSeasonPhase('playoffs');

                    const gameStateRecord = await db.gameState.where('leagueId').equals(currentLeagueId).first();
                    await db.gameState.update(gameStateRecord.id, {
                        seasonPhase: 'playoffs',
                        standings: newStandings
                    });

                    const updatedMyPlayers = await db.players
                        .where('[leagueId+team+season]')
                        .equals([currentLeagueId, currentTeam, currentSeason])
                        .toArray();
                    setMyPlayers(updatedMyPlayers);

                } catch (error) {
                    console.error('Error simulating season:', error);
                }
                setLoading(false);
            }

            async function generateSeasonSchedule(leagueId, season, teamNames) {
                const schedule = [];
                const numTeams = teamNames.length;
                const gamesPerTeam = 82;
                const totalDays = 180; // 6-month season
                const targetGamesPerDay = 10; // ~10 games per day for 30 teams
                
                // Helper to get random game time
                function getRandomGameTime() {
                    const times = ["7:00 PM", "7:30 PM", "8:00 PM", "8:30 PM", "9:00 PM", "10:00 PM"];
                    return times[Math.floor(Math.random() * times.length)];
                }
                
                // Helper to get games played by a team
                function getGamesPlayed(teamName) {
                    return schedule.filter(g => g.homeTeam === teamName || g.awayTeam === teamName).length;
                }
                
                // Helper to get team's last game day
                function getLastGameDay(teamName) {
                    const teamGames = schedule.filter(g => g.homeTeam === teamName || g.awayTeam === teamName);
                    if (teamGames.length === 0) return 0;
                    return Math.max(...teamGames.map(g => g.day));
                }
                
                // Helper to count consecutive game days
                function getConsecutiveGameDays(teamName, currentDay) {
                    const teamGames = schedule
                        .filter(g => g.homeTeam === teamName || g.awayTeam === teamName)
                        .sort((a, b) => b.day - a.day); // Sort by day descending
                    
                    let consecutiveDays = 0;
                    for (let checkDay = currentDay - 1; checkDay > 0; checkDay--) {
                        const hasGame = teamGames.some(g => g.day === checkDay);
                        if (hasGame) {
                            consecutiveDays++;
                        } else {
                            break; // Stop counting when we find a rest day
                        }
                    }
                    return consecutiveDays;
                }
                
                // Track home/away games needed and opponent matchups
                const gamesNeeded = {};
                teamNames.forEach(team => {
                    gamesNeeded[team] = {
                        home: gamesPerTeam / 2,
                        away: gamesPerTeam / 2,
                        opponents: {}
                    };
                    
                    teamNames.forEach(opp => {
                        if (team !== opp) {
                            gamesNeeded[team].opponents[opp] = 0;
                        }
                    });
                });
                
                let gameId = 1;
                
                // Schedule games day by day across the season
                for (let currentDay = 1; currentDay <= totalDays; currentDay++) {
                    const teamsPlayingToday = new Set();
                    let gamesScheduledToday = 0;
                    
                    // Try to schedule ~10 games this day
                    let attempts = 0;
                    const maxAttempts = numTeams * 2;
                    
                    while (gamesScheduledToday < targetGamesPerDay && attempts < maxAttempts) {
                        attempts++;
                        
                        // Find available teams that can play today
                        const availableTeams = teamNames.filter(team => {
                            // Skip if already playing today
                            if (teamsPlayingToday.has(team)) return false;
                            
                            // Skip if team has played all their games
                            if (getGamesPlayed(team) >= gamesPerTeam) return false;
                            
                            const lastGameDay = getLastGameDay(team);
                            const daysSinceLastGame = currentDay - lastGameDay;
                            
                            // Allow back-to-backs (0 days rest) 15% of the time
                            // But NEVER allow 3 games in a row (2+ consecutive game days)
                            const consecutiveGameDays = getConsecutiveGameDays(team, currentDay);
                            
                            if (consecutiveGameDays >= 2) {
                                // Team has played 2+ days in a row, MUST rest
                                return false;
                            } else if (daysSinceLastGame === 0) {
                                // Same day - never allow
                                return false;
                            } else if (daysSinceLastGame === 1) {
                                // Back-to-back - allow 15% of the time
                                return Math.random() < 0.15;
                            } else {
                                // 2+ days rest - always allow
                                return true;
                            }
                        });
                        
                        if (availableTeams.length < 2) break;
                        
                        // Pick first team randomly
                        const team1 = availableTeams[Math.floor(Math.random() * availableTeams.length)];
                        
                        // Find valid opponent
                        const validOpponents = availableTeams.filter(team2 => {
                            if (team1 === team2) return false;
                            // Check if they haven't played too many times (max 4 games)
                            if (gamesNeeded[team1].opponents[team2] >= 4) return false;
                            return true;
                        });
                        
                        if (validOpponents.length === 0) continue;
                        
                        const team2 = validOpponents[Math.floor(Math.random() * validOpponents.length)];
                        
                        // Determine home/away
                        const team1NeedsHome = gamesNeeded[team1].home > 0;
                        const team1NeedsAway = gamesNeeded[team1].away > 0;
                        const team2NeedsHome = gamesNeeded[team2].home > 0;
                        const team2NeedsAway = gamesNeeded[team2].away > 0;
                        
                        let homeTeam, awayTeam;
                        
                        if (team1NeedsHome && team2NeedsAway) {
                            homeTeam = team1;
                            awayTeam = team2;
                        } else if (team1NeedsAway && team2NeedsHome) {
                            homeTeam = team2;
                            awayTeam = team1;
                        } else if (team1NeedsHome && team2NeedsHome) {
                            // Both need home - choose randomly
                            if (Math.random() > 0.5) {
                                homeTeam = team1;
                                awayTeam = team2;
                            } else {
                                homeTeam = team2;
                                awayTeam = team1;
                            }
                        } else if (team1NeedsAway && team2NeedsAway) {
                            // Both need away - choose randomly
                            if (Math.random() > 0.5) {
                                homeTeam = team2;
                                awayTeam = team1;
                            } else {
                                homeTeam = team1;
                                awayTeam = team2;
                            }
                        } else {
                            continue;
                        }
                        
                        // Create the game
                        schedule.push({
                            leagueId,
                            season,
                            gameNumber: gameId++,
                            day: currentDay,
                            time: getRandomGameTime(),
                            homeTeam,
                            awayTeam,
                            result: null,
                            homeScore: null,
                            awayScore: null,
                            overtime: false
                        });
                        
                        // Update tracking
                        teamsPlayingToday.add(team1);
                        teamsPlayingToday.add(team2);
                        
                        if (homeTeam === team1) {
                            gamesNeeded[team1].home--;
                            gamesNeeded[team2].away--;
                        } else {
                            gamesNeeded[team2].home--;
                            gamesNeeded[team1].away--;
                        }
                        
                        gamesNeeded[team1].opponents[team2]++;
                        gamesNeeded[team2].opponents[team1]++;
                        
                        gamesScheduledToday++;
                    }
                }
                
                // Save schedule to database
                await db.schedule.bulkAdd(schedule);
                
                console.log(`Schedule generated: ${schedule.length} total games across ${totalDays} days`);
                
                return schedule;
            }

                for (let i = 0; i < 60; i++) {
                    const position = positions[Math.floor(Math.random() * positions.length)];
                    const age = 19 + Math.floor(Math.random() * 4); // 19-22
                    
                    // Top picks have higher potential
                    let potentialBase;
                    if (i < 5) potentialBase = 80; // Top 5: Elite potential
                    else if (i < 14) potentialBase = 75; // Lottery: High potential
                    else if (i < 30) potentialBase = 70; // First round: Good potential
                    else potentialBase = 65; // Second round: Decent potential
                    
                    const potential = potentialBase + Math.floor(Math.random() * 15) - 5; // ±5 variance
                    const currentRating = Math.max(45, potential - 15 - Math.floor(Math.random() * 15)); // 10-25 below potential
                    
                    // Physical attributes
                    const heights = {
                        'PG': [72, 76],
                        'SG': [74, 78],
                        'SF': [77, 81],
                        'PF': [80, 84],
                        'C': [82, 88]
                    };
                    const range = heights[position];
                    const heightInches = range[0] + Math.floor(Math.random() * (range[1] - range[0]));
                    const feet = Math.floor(heightInches / 12);
                    const inches = heightInches % 12;
                    const height = `${feet}'${inches}"`;
                    const weight = 160 + (heightInches - 72) * 5 + Math.floor(Math.random() * 40);
                    
                    // Generate detailed skills
                    const variation = () => Math.floor(Math.random() * 20) - 10;
                    const skills = {
                        insideScoring: Math.max(35, Math.min(90, currentRating + variation() + (['C', 'PF'].includes(position) ? 10 : -10))),
                        midRange: Math.max(35, Math.min(90, currentRating + variation())),
                        threePoint: Math.max(30, Math.min(95, currentRating + variation() + (['PG', 'SG'].includes(position) ? 10 : -10))),
                        passing: Math.max(35, Math.min(90, currentRating + variation() + (position === 'PG' ? 15 : 0))),
                        defense: Math.max(40, Math.min(90, currentRating + variation())),
                        rebounding: Math.max(35, Math.min(90, currentRating + variation() + (['C', 'PF'].includes(position) ? 15 : -5))),
                        athleticism: Math.max(50, Math.min(98, currentRating + variation() + Math.floor(Math.random() * 10))),
                        bbIQ: Math.max(40, Math.min(90, currentRating + variation()))
                    };
                    
                    // Scouting grade
                    let grade;
                    if (potential >= 90) grade = 'A+';
                    else if (potential >= 85) grade = 'A';
                    else if (potential >= 80) grade = 'A-';
                    else if (potential >= 75) grade = 'B+';
                    else if (potential >= 70) grade = 'B';
                    else if (potential >= 65) grade = 'B-';
                    else if (potential >= 60) grade = 'C+';
                    else grade = 'C';
                    
                    // Get random strengths/weaknesses
                    const prospectStrengths = [];
                    const prospectWeaknesses = [];
                    for (let j = 0; j < 2; j++) {
                        prospectStrengths.push(strengths[Math.floor(Math.random() * strengths.length)]);
                        prospectWeaknesses.push(weaknesses[Math.floor(Math.random() * weaknesses.length)]);
                    }
                    
                    prospects.push({
                        leagueId,
                        season,
                        name: `${firstNames[Math.floor(Math.random() * firstNames.length)]} ${lastNames[Math.floor(Math.random() * lastNames.length)]}`,
                        position,
                        age,
                        height,
                        weight,
                        college: colleges[Math.floor(Math.random() * colleges.length)],
                        currentRating,
                        potential,
                        skills,
                        scoutingGrade: grade,
                        projectedPick: i + 1,
                        strengths: prospectStrengths,
                        weaknesses: prospectWeaknesses,
                        workEthic: workEthics[Math.floor(Math.random() * workEthics.length)],
                        intangibles: intangibles[Math.floor(Math.random() * intangibles.length)],
                        drafted: false,
                        draftedBy: null,
                        draftPick: null,
                        scoutingLevel: 0 // 0 = unscouted, 1 = basic, 2 = full
                    });
                }
                
                // Save prospects to database
                await db.draftProspects.bulkAdd(prospects);
                return prospects;
            }
            
            async function loadDraftProspects() {
                try {
                    const prospects = await db.draftProspects

                    setDraftProspects(prospects);

            }
            
            function scoutProspect(prospectId, level = 2) {
                if (scoutingBudget <= 0 && level === 2) {
                    alert('No scouting budget remaining!');
                    return;
                }
                
                // Update prospect scouting level
                setDraftProspects(prev => prev.map(p => 
                    p.id === prospectId ? { ...p, scoutingLevel: level } : p
                ));
                
                if (level === 2) {
                    setScoutedPlayers(prev => new Set([...prev, prospectId]));
                    setScoutingBudget(prev => prev - 1);
                }
            }
            
            async function calculateDraftOrder() {
                // Based on standings (worst teams pick first)
                const standingsArray = getStandingsData();
                const order = [];
                
                // Reverse standings for draft order (worst team picks 1st)
                const reversed = [...standingsArray].reverse();
                
                // Round 1
                reversed.forEach((team, idx) => {
                    order.push({
                        pick: idx + 1,
                        round: 1,
                        team: team.team,
                        traded: false
                    });
                });
                
                // Round 2 (same order)
                reversed.forEach((team, idx) => {
                    order.push({
                        pick: idx + 31,
                        round: 2,
                        team: team.team,
                        traded: false
                    });
                });
                
                setDraftOrder(order);
                return order;
            }
            
            function aiDraftPick(team, availableProspects) {
                // Analyze team needs
                const teamNeeds = ['PG', 'SG', 'SF', 'PF', 'C']; // Simplified - all positions
                
                // Score each prospect
                const scoredProspects = availableProspects.map(prospect => {
                    let score = prospect.potential * 0.7 + prospect.currentRating * 0.3;
                    
                    // Bonus for team needs (random for now)
                    if (Math.random() > 0.5) {
                        score += 10;
                    }
                    
                    // Add randomness (±15 points)
                    score += (Math.random() * 30 - 15);
                    
                    return { prospect, score };
                });
                
                // Pick highest scored
                scoredProspects.sort((a, b) => b.score - a.score);
                return scoredProspects[0].prospect;
            }
            
            async function simulateDraft(mode = 'auto') {
                setDraftInProgress(true);
                const order = draftOrder.length > 0 ? draftOrder : await calculateDraftOrder();
                const results = [];
                let available = [...draftProspects].filter(p => !p.drafted);
                
                for (let i = 0; i < order.length; i++) {
                    const pickInfo = order[i];
                    
                    if (available.length === 0) break;
                    
                    let selectedProspect;
                    
                    // Check if it's user's team
                    if (pickInfo.team === currentTeam && mode === 'live') {
                        // In live mode, pause for user selection
                        setCurrentDraftPick(i + 1);
                        return; // Wait for user to make selection
                    } else {
                        // AI makes pick (including auto-draft for user)
                        if (pickInfo.team === currentTeam && bigBoard.length > 0) {
                            // Use user's big board for auto-draft
                            selectedProspect = bigBoard.find(p => available.some(a => a.id === p.id));
                        } else {
                            // AI team picks
                            selectedProspect = aiDraftPick(pickInfo.team, available);
                        }
                    }
                    
                    if (selectedProspect) {
                        // Mark as drafted
                        selectedProspect.drafted = true;
                        selectedProspect.draftedBy = pickInfo.team;
                        selectedProspect.draftPick = pickInfo.pick;
                        
                        results.push({
                            pick: pickInfo.pick,
                            round: pickInfo.round,
                            team: pickInfo.team,
                            prospect: selectedProspect
                        });
                        
                        // Remove from available
                        available = available.filter(p => p.id !== selectedProspect.id);
                        
                        // Update database
                        await db.draftProspects.update(selectedProspect.id, {
                            drafted: true,
                            draftedBy: pickInfo.team,
                            draftPick: pickInfo.pick
                        });
                    }
                }
                
                setDraftResults(results);
                setDraftInProgress(false);
                setDraftProspects(prev => prev.map(p => {
                    const result = results.find(r => r.prospect.id === p.id);
                    return result ? { ...p, drafted: true, draftedBy: result.team, draftPick: result.pick } : p;
                }));
                
                // Add drafted players to respective teams
                await addDraftedPlayersToRosters(results);
            }
            
            async function addDraftedPlayersToRosters(draftResults) {
                const newPlayers = [];
                
                for (const result of draftResults) {
                    const prospect = result.prospect;
                    
                    // Determine rookie salary based on draft position
                    let salary;
                    if (result.pick <= 5) salary = 8000000 + Math.random() * 2000000; // $8-10M
                    else if (result.pick <= 10) salary = 5000000 + Math.random() * 2000000; // $5-7M
                    else if (result.pick <= 20) salary = 3000000 + Math.random() * 1500000; // $3-4.5M
                    else if (result.pick <= 30) salary = 1500000 + Math.random() * 1000000; // $1.5-2.5M
                    else salary = 1000000 + Math.random() * 500000; // $1-1.5M
                    
                    newPlayers.push({
                        leagueId: currentLeagueId,
                        team: result.team,
                        season: currentSeason,
                        name: prospect.name,
                        age: prospect.age,
                        position: prospect.position,
                        rating: prospect.currentRating,
                        potential: prospect.potential,
                        contractYears: 4, // Rookie contracts
                        salary: Math.round(salary),
                        hometown: generateHometown(),
                        college: prospect.college,
                        heightInches: parseInt(prospect.height.split("'")[0]) * 12 + parseInt(prospect.height.split("'")[1]),
                        weight: prospect.weight,
                        draftYear: currentSeason,
                        draftRound: result.round,
                        draftPick: result.pick,
                        draftTeam: result.team,
                        ppg: 0,
                        rpg: 0,
                        apg: 0,
                        // Copy skills from prospect
                        insideScoring: prospect.skills.insideScoring,
                        midRange: prospect.skills.midRange,
                        threePoint: prospect.skills.threePoint,
                        passing: prospect.skills.passing,
                        defense: prospect.skills.defense,
                        rebounding: prospect.skills.rebounding
                    });
                }
                
                await db.players.bulkAdd(newPlayers);
                
                // Reload current team's players if they drafted
                if (draftResults.some(r => r.team === currentTeam)) {
                    const updatedPlayers = await db.players
                        .where('[leagueId+team+season]')
                        .equals([currentLeagueId, currentTeam, currentSeason])
                        .toArray();
                    setMyPlayers(updatedPlayers);
                }
            }
