                                        </div>
                                        
                                        <div className="bg-slate-800 rounded-lg p-6 shadow-xl mb-6">
                                            <div className="grid grid-cols-3 gap-6 text-center">
                                                <div>
                                                    <div className="text-gray-400 text-sm">Roster Size</div>
                                                    <div className="text-3xl font-bold">{viewingTeamPlayers.length}</div>
                                                </div>
                                                <div>
                                                    <div className="text-gray-400 text-sm">Avg Rating</div>
                                                    <div className="text-3xl font-bold text-blue-400">
                                                        {viewingTeamPlayers.length > 0 ? Math.round(viewingTeamPlayers.reduce((sum, p) => sum + p.rating, 0) / viewingTeamPlayers.length) : 0}
                                                    </div>
                                                </div>
                                                <div>
                                                    <div className="text-gray-400 text-sm">Total Salary</div>
                                                    <div className="text-3xl font-bold text-green-400">
                                                        ${(viewingTeamPlayers.reduce((sum, p) => sum + p.salary, 0) / 1000000).toFixed(1)}M
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-slate-800 rounded-lg p-6 shadow-xl">
                                            <div className="overflow-x-auto">
                                                <table className="w-full">
                                                    <thead className="bg-slate-700">
                                                        <tr>
                                                            <th className="px-4 py-3 text-left">Name</th>
                                                            <th className="px-4 py-3">Pos</th>
                                                            <th className="px-4 py-3">Age</th>
                                                            <th className="px-4 py-3">Ovr</th>
                                                            <th className="px-4 py-3">Pot</th>
                                                            <th className="px-4 py-3">Contract</th>
                                                            <th className="px-4 py-3">Salary</th>
                                                            <th className="px-4 py-3">PPG</th>
                                                            <th className="px-4 py-3">RPG</th>
                                                            <th className="px-4 py-3">APG</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {viewingTeamPlayers.sort((a, b) => b.rating - a.rating).map(player => (
                                                            <tr key={player.id} className="border-b border-slate-700 hover:bg-slate-700">
                                                                <td className="px-4 py-3">
                                                                    <button 
                                                                        onClick={() => openPlayerProfile(player)}
                                                                        className="font-semibold text-blue-400 hover:text-blue-300 underline cursor-pointer"
                                                                    >
                                                                        {player.name}
                                                                    </button>
                                                                </td>
                                                                <td className="px-4 py-3 text-center">{player.position}</td>
                                                                <td className="px-4 py-3 text-center">{player.age}</td>
                                                                <td className="px-4 py-3 text-center">
                                                                    <span className={player.rating >= 80 ? 'text-green-400 font-bold' : player.rating >= 70 ? 'text-blue-400' : 'text-gray-400'}>
                                                                        {player.rating}
                                                                    </span>
                                                                </td>
                                                                <td className="px-4 py-3 text-center text-purple-400">{player.potential}</td>
                                                                <td className="px-4 py-3 text-center">{player.contractYears}yr</td>
                                                                <td className="px-4 py-3 text-center">${(player.salary / 1000000).toFixed(1)}M</td>
                                                                <td className="px-4 py-3 text-center">{player.ppg}</td>
                                                                <td className="px-4 py-3 text-center">{player.rpg}</td>
                                                                <td className="px-4 py-3 text-center">{player.apg}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {currentPage === 'finances' && (
                                    <div>
                                        <h2 className="text-3xl font-bold mb-6">Team Finances</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="bg-slate-800 rounded-lg p-6 shadow-xl">
                                                <h3 className="text-xl font-bold mb-4">Salary Overview</h3>
                                                <div className="space-y-4">
                                                    <div>
                                                        <div className="flex justify-between mb-2">
                                                            <span>Total Payroll</span>
                                                            <span className="font-bold">${(totalSalary / 1000000).toFixed(2)}M</span>
                                                        </div>
                                                        <div className="w-full bg-slate-700 rounded-full h-4">
                                                            <div 
                                                                className={`h-4 rounded-full ${totalSalary > LUXURY_TAX ? 'bg-red-600' : totalSalary > SALARY_CAP ? 'bg-yellow-600' : 'bg-green-600'}`}
                                                                style={{width: `${Math.min(100, (totalSalary / LUXURY_TAX) * 100)}%`}}
                                                            ></div>
                                                        </div>
                                                    </div>
                                                    <div className="flex justify-between">
                                                        <span>Salary Cap</span>
                                                        <span>${(SALARY_CAP / 1000000).toFixed(1)}M</span>
                                                    </div>
                                                    <div className="flex justify-between">
                                                        <span>Luxury Tax Line</span>
                                                        <span>${(LUXURY_TAX / 1000000).toFixed(1)}M</span>
                                                    </div>
                                                    <div className="flex justify-between">
                                                        <span className="font-bold">Cap Space</span>
                                                        <span className={`font-bold ${capSpace < 0 ? 'text-red-400' : 'text-green-400'}`}>
                                                            ${(capSpace / 1000000).toFixed(2)}M
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-slate-800 rounded-lg p-6 shadow-xl">
                                                <h3 className="text-xl font-bold mb-4">Top Salaries</h3>
                                                <div className="space-y-2">
                                                    {myPlayers
                                                        .sort((a, b) => b.salary - a.salary)
                                                        .slice(0, 5)
                                                        .map(player => (
                                                            <div key={player.id} className="flex justify-between items-center p-2 bg-slate-700 rounded">
                                                                <span>{player.name}</span>
                                                                <span className="font-bold">${(player.salary / 1000000).toFixed(1)}M</span>
                                                            </div>
                                                        ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* DRAFT PAGE */}
                                {currentPage === 'draft' && (() => {
                                    const availableProspects = draftProspects.filter(p => !p.drafted);
                                    const draftedProspects = draftProspects.filter(p => p.drafted);
                                    const myPicks = draftOrder.filter(p => p.team === currentTeam);
                                    
                                    return (
                                        <div>
                                            <div className="flex justify-between items-center mb-6">
                                                <h2 className="text-3xl font-bold">NBA Draft {currentSeason}</h2>
                                                <div className="flex gap-3">
                                                    <div className="bg-blue-900 bg-opacity-30 px-4 py-2 rounded-lg">
                                                        <span className="text-sm text-gray-400">Scouting Budget: </span>
                                                        <span className="font-bold text-blue-400">{scoutingBudget} / 20</span>
                                                    </div>
                                                    {!draftInProgress && draftProspects.length === 0 && (
                                                        <button
                                                            onClick={async () => {
                                                                await generateDraftClass(currentLeagueId, currentSeason);
                                                                await loadDraftProspects();
                                                                await calculateDraftOrder();
                                                            }}
                                                            className="bg-green-600 hover:bg-green-700 px-6 py-2 rounded-lg font-semibold"
                                                        >
                                                            Generate Draft Class
                                                        </button>
                                                    )}
                                                    {draftProspects.length > 0 && !draftInProgress && (
                                                        <button
                                                            onClick={() => simulateDraft('auto')}
                                                            className="bg-purple-600 hover:bg-purple-700 px-6 py-2 rounded-lg font-semibold"
                                                        >
                                                            Auto-Draft
                                                        </button>
                                                    )}
                                                </div>
                                            </div>

                                            {draftProspects.length === 0 ? (
                                                <div className="bg-slate-800 rounded-lg p-12 shadow-xl text-center">
                                                    <div className="text-6xl mb-4">🎯</div>
                                                    <h3 className="text-2xl font-bold mb-2">No Draft Class Generated</h3>
                                                    <p className="text-gray-400 mb-6">Generate a draft class to begin scouting prospects</p>
                                                </div>
                                            ) : (
                                                <div>
                                                    {/* Tab Navigation */}
                                                    <div className="flex gap-2 mb-6 border-b border-slate-700">
                                                        <button
                                                            onClick={() => setDraftTab('prospects')}
                                                            className={`px-6 py-3 font-semibold transition ${
                                                                draftTab === 'prospects' 
                                                                    ? 'bg-blue-600 text-white' 
                                                                    : 'bg-slate-700 text-gray-400 hover:bg-slate-600'
                                                            }`}
                                                        >
                                                            All Prospects ({draftProspects.length})
                                                        </button>
                                                        <button
                                                            onClick={() => setDraftTab('mypicks')}
                                                            className={`px-6 py-3 font-semibold transition ${
                                                                draftTab === 'mypicks' 
                                                                    ? 'bg-blue-600 text-white' 
                                                                    : 'bg-slate-700 text-gray-400 hover:bg-slate-600'
                                                            }`}
                                                        >
                                                            My Picks ({myPicks.length})
                                                        </button>
                                                        <button
                                                            onClick={() => setDraftTab('results')}
                                                            className={`px-6 py-3 font-semibold transition ${
                                                                draftTab === 'results' 
                                                                    ? 'bg-blue-600 text-white' 
                                                                    : 'bg-slate-700 text-gray-400 hover:bg-slate-600'
                                                            }`}
                                                        >
                                                            Draft Results ({draftedProspects.length})
                                                        </button>
                                                    </div>

                                                    {/* Prospects Tab */}
                                                    {draftTab === 'prospects' && (
                                                        <div className="bg-slate-800 rounded-lg p-6 shadow-xl">
                                                            <div className="overflow-x-auto">
                                                                <table className="w-full text-sm">
                                                                    <thead className="border-b border-slate-700">
                                                                        <tr>
                                                                            <th className="px-3 py-3 text-left">#</th>
                                                                            <th className="px-3 py-3 text-left">Name</th>
                                                                            <th className="px-3 py-3 text-center">Pos</th>
                                                                            <th className="px-3 py-3 text-center">Age</th>
                                                                            <th className="px-3 py-3 text-left">College</th>
                                                                            <th className="px-3 py-3 text-center">Grade</th>
                                                                            <th className="px-3 py-3 text-center">Ovr</th>
                                                                            <th className="px-3 py-3 text-center">Pot</th>
                                                                            <th className="px-3 py-3 text-center">Status</th>
                                                                            <th className="px-3 py-3 text-center">Actions</th>
                                                                        </tr>
                                                                    </thead>
                                                                    <tbody>
                                                                        {draftProspects.sort((a, b) => a.projectedPick - b.projectedPick).map((prospect, idx) => (
                                                                            <tr 
                                                                                key={prospect.id}
                                                                                className={`border-b border-slate-700 hover:bg-slate-700 transition ${
                                                                                    prospect.drafted ? 'opacity-50' : ''
                                                                                }`}
                                                                            >
                                                                                <td className="px-3 py-3 text-gray-400">{prospect.projectedPick}</td>
                                                                                <td className="px-3 py-3">
                                                                                    <button
                                                                                        onClick={() => setSelectedProspect(prospect)}
                                                                                        className="font-semibold text-blue-400 hover:text-blue-300 underline"
                                                                                    >
                                                                                        {prospect.name}
                                                                                    </button>
                                                                                </td>
                                                                                <td className="px-3 py-3 text-center">{prospect.position}</td>
                                                                                <td className="px-3 py-3 text-center">{prospect.age}</td>
                                                                                <td className="px-3 py-3">{prospect.college}</td>
                                                                                <td className="px-3 py-3 text-center">
                                                                                    <span className={`px-2 py-1 rounded text-xs font-bold ${
                                                                                        prospect.scoutingGrade.startsWith('A') ? 'bg-green-900 text-green-300' :
                                                                                        prospect.scoutingGrade.startsWith('B') ? 'bg-blue-900 text-blue-300' :
                                                                                        'bg-gray-700 text-gray-300'
                                                                                    }`}>
                                                                                        {prospect.scoutingGrade}
                                                                                    </span>
                                                                                </td>
                                                                                <td className="px-3 py-3 text-center">
                                                                                    {prospect.scoutingLevel >= 1 ? prospect.currentRating : '??'}
                                                                                </td>
                                                                                <td className="px-3 py-3 text-center text-purple-400">
                                                                                    {prospect.scoutingLevel >= 2 ? prospect.potential : '??'}
                                                                                </td>
                                                                                <td className="px-3 py-3 text-center">
                                                                                    {prospect.drafted ? (
                                                                                        <span className="text-sm text-red-400">Drafted</span>
                                                                                    ) : (
                                                                                        <span className="text-sm text-green-400">Available</span>
                                                                                    )}
                                                                                </td>
                                                                                <td className="px-3 py-3 text-center">
                                                                                    {!prospect.drafted && prospect.scoutingLevel < 2 && (
                                                                                        <button
                                                                                            onClick={() => scoutProspect(prospect.id, 2)}
                                                                                            className="px-3 py-1 bg-indigo-600 hover:bg-indigo-700 rounded text-xs font-semibold"
                                                                                            disabled={scoutingBudget <= 0}
                                                                                        >
                                                                                            Scout ({scoutingBudget})
                                                                                        </button>
                                                                                    )}
                                                                                    {prospect.scoutingLevel === 2 && (
                                                                                        <span className="text-xs text-indigo-400">✓ Scouted</span>
                                                                                    )}
                                                                                </td>
                                                                            </tr>
                                                                        ))}
                                                                    </tbody>
                                                                </table>
                                                            </div>
                                                        </div>
                                                    )}

                                                    {/* My Picks Tab */}
                                                    {draftTab === 'mypicks' && (
                                                        <div className="bg-slate-800 rounded-lg p-6 shadow-xl">
                                                            <h3 className="text-xl font-bold mb-4">Your Draft Picks</h3>
                                                            <div className="space-y-3">
                                                                {myPicks.map(pick => {
                                                                    const result = draftResults.find(r => r.pick === pick.pick);
                                                                    return (
                                                                        <div key={pick.pick} className="bg-slate-700 p-4 rounded-lg flex justify-between items-center">
                                                                            <div>
                                                                                <span className="font-bold text-blue-400">Pick #{pick.pick}</span>
                                                                                <span className="text-gray-400 ml-2">(Round {pick.round})</span>
                                                                            </div>
                                                                            {result ? (
                                                                                <div className="text-right">
                                                                                    <div className="font-semibold">{result.prospect.name}</div>
                                                                                    <div className="text-sm text-gray-400">{result.prospect.position} • {result.prospect.college}</div>
                                                                                </div>
                                                                            ) : (
                                                                                <span className="text-gray-500 italic">Not yet drafted</span>
                                                                            )}
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    )}

                                                    {/* Draft Results Tab */}
                                                    {draftTab === 'results' && (
                                                        <div className="bg-slate-800 rounded-lg p-6 shadow-xl">
                                                            <h3 className="text-xl font-bold mb-4">Draft Results</h3>
                                                            {draftResults.length === 0 ? (
                                                                <div className="text-center py-12 text-gray-400">
                                                                    Draft has not started yet
                                                                </div>
                                                            ) : (
                                                                <div className="space-y-2">
                                                                    {draftResults.map(result => (
                                                                        <div key={result.pick} className={`p-3 rounded-lg flex justify-between items-center ${
                                                                            result.team === currentTeam ? 'bg-blue-900 bg-opacity-30 border-l-4 border-blue-500' : 'bg-slate-700'
                                                                        }`}>
                                                                            <div className="flex items-center gap-4">
                                                                                <span className="font-bold text-gray-400 w-12">#{result.pick}</span>
                                                                                <div>
                                                                                    <div className="font-semibold">{result.prospect.name}</div>
                                                                                    <div className="text-sm text-gray-400">
                                                                                        {result.prospect.position} • {result.prospect.height} • {result.prospect.college}
                                                                                    </div>
                                                                                </div>
                                                                            </div>
                                                                            <div className="text-right">
                                                                                <div className="text-sm text-gray-400">{result.team}</div>
                                                                                <div className="text-xs">
                                                                                    <span className="text-gray-400">Rating:</span> {result.prospect.currentRating}
                                                                                    <span className="text-purple-400 ml-2">Pot:</span> {result.prospect.potential}
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}
                                                </div>
                                            )}

                                            {/* Prospect Detail Modal */}
                                            {selectedProspect && (
                                                <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-4" onClick={() => setSelectedProspect(null)}>
                                                    <div className="bg-slate-800 rounded-lg p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
                                                        <div className="flex justify-between items-start mb-6">
                                                            <div>
                                                                <h3 className="text-3xl font-bold">{selectedProspect.name}</h3>
                                                                <div className="text-gray-400 mt-1">
                                                                    {selectedProspect.position} • {selectedProspect.height} • {selectedProspect.weight} lbs • Age {selectedProspect.age}
                                                                </div>
                                                                <div className="text-blue-400 mt-1">{selectedProspect.college}</div>
                                                            </div>
                                                            <button onClick={() => setSelectedProspect(null)} className="text-gray-400 hover:text-white text-3xl">×</button>
                                                        </div>

                                                        <div className="grid grid-cols-2 gap-6 mb-6">
                                                            <div className="bg-slate-700 p-4 rounded-lg">
                                                                <div className="text-sm text-gray-400">Scouting Grade</div>
                                                                <div className="text-3xl font-bold text-green-400">{selectedProspect.scoutingGrade}</div>
                                                            </div>
                                                            <div className="bg-slate-700 p-4 rounded-lg">
                                                                <div className="text-sm text-gray-400">Projected Pick</div>
                                                                <div className="text-3xl font-bold text-blue-400">#{selectedProspect.projectedPick}</div>
                                                            </div>
                                                            <div className="bg-slate-700 p-4 rounded-lg">
                                                                <div className="text-sm text-gray-400">Current Rating</div>
                                                                <div className="text-3xl font-bold">
                                                                    {selectedProspect.scoutingLevel >= 1 ? selectedProspect.currentRating : '??'}
                                                                </div>
                                                            </div>
                                                            <div className="bg-slate-700 p-4 rounded-lg">
                                                                <div className="text-sm text-gray-400">Potential</div>
                                                                <div className="text-3xl font-bold text-purple-400">
                                                                    {selectedProspect.scoutingLevel >= 2 ? selectedProspect.potential : '??'}
                                                                </div>
                                                            </div>
                                                        </div>

                                                        {selectedProspect.scoutingLevel >= 2 && (
                                                            <div>
                                                                <h4 className="font-bold text-lg mb-3">Skills</h4>
                                                                <div className="grid grid-cols-2 gap-3 mb-6">
                                                                    {Object.entries(selectedProspect.skills).map(([skill, value]) => (
                                                                        <div key={skill} className="bg-slate-700 p-3 rounded">
                                                                            <div className="flex justify-between mb-1">
                                                                                <span className="text-sm capitalize">{skill.replace(/([A-Z])/g, ' $1').trim()}</span>
                                                                                <span className="font-bold">{value}</span>
                                                                            </div>
                                                                            <div className="w-full bg-slate-600 rounded-full h-2">
                                                                                <div className={`h-2 rounded-full ${value >= 80 ? 'bg-green-500' : value >= 60 ? 'bg-blue-500' : 'bg-gray-500'}`} style={{width: `${value}%`}}></div>
                                                                            </div>
                                                                        </div>
                                                                    ))}
                                                                </div>

                                                                <div className="grid grid-cols-2 gap-6 mb-6">
                                                                    <div>
                                                                        <h4 className="font-bold text-green-400 mb-2">Strengths</h4>
                                                                        <ul className="space-y-1">
                                                                            {selectedProspect.strengths.map((s, i) => (
                                                                                <li key={i} className="text-sm">✓ {s}</li>
                                                                            ))}
                                                                        </ul>
                                                                    </div>
                                                                    <div>
                                                                        <h4 className="font-bold text-red-400 mb-2">Weaknesses</h4>
                                                                        <ul className="space-y-1">
                                                                            {selectedProspect.weaknesses.map((w, i) => (
                                                                                <li key={i} className="text-sm">✗ {w}</li>
                                                                            ))}
                                                                        </ul>
                                                                    </div>
                                                                </div>

                                                                <div className="bg-slate-700 p-4 rounded-lg">
                                                                    <div className="grid grid-cols-2 gap-4">
                                                                        <div>
                                                                            <span className="text-gray-400 text-sm">Work Ethic:</span>
                                                                            <span className="ml-2 font-semibold">{selectedProspect.workEthic}</span>
                                                                        </div>
                                                                        <div>
                                                                            <span className="text-gray-400 text-sm">Intangibles:</span>
                                                                            <span className="ml-2 font-semibold">{selectedProspect.intangibles}</span>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        )}

                                                        {selectedProspect.scoutingLevel < 2 && (
                                                            <div className="bg-slate-700 p-6 rounded-lg text-center">
                                                                <p className="text-gray-400 mb-4">Full scouting report not available</p>
                                                                <button
                                                                    onClick={() => {
                                                                        scoutProspect(selectedProspect.id, 2);
                                                                        setSelectedProspect({...selectedProspect, scoutingLevel: 2});
                                                                    }}
                                                                    className="bg-indigo-600 hover:bg-indigo-700 px-6 py-2 rounded-lg font-semibold"
                                                                    disabled={scoutingBudget <= 0}
                                                                >
                                                                    Scout Player (Budget: {scoutingBudget})
                                                                </button>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })()}
                            </div>
                        </div>
                    </div>
                );
            }
        };

        ReactDOM.render(<BasketballGM />, document.getElementById('root'));
    </script>
</body>
</html>
